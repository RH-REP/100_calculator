<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>10の城壁 - ゲーム4</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #263238;
      --soft-ink: #52636a;
      --paper: #fffaf0;
      --panel: #fffdf7;
      --line: #2d4640;
      --green: #4f9d69;
      --green-deep: #236247;
      --mint: #dff5dc;
      --sky: #dff3fb;
      --wood: #b86b3e;
      --wood-dark: #704229;
      --stone: #87949c;
      --stone-dark: #5f6b72;
      --gold: #f0c34e;
      --warning: #d75555;
      --violet: #7767a8;
      --shadow: rgba(20, 40, 34, 0.18);
      --focus: rgba(38, 95, 189, 0.34);
      --radius: 8px;
      --shell-gap: clamp(7px, 1.25vh, 12px);
      --panel-pad: clamp(7px, 1.25vh, 12px);
      --panel-gap: clamp(5px, 0.95vh, 10px);
      --button-gap: clamp(4px, 0.66vh, 7px);
      --deploy-size: clamp(44px, 6vh, 72px);
      --tool-width: clamp(40px, 5.2vh, 52px);
      --number-row-height: clamp(30px, 4.6vh, 50px);
      --special-row-height: clamp(34px, 5vh, 56px);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ecf8f0 0%, #f8f4e6 48%, #f0e9d5 100%);
      letter-spacing: 0;
    }

    body {
      display: flex;
      justify-content: center;
      padding: clamp(8px, 2vh, 20px);
    }

    button {
      font: inherit;
    }

    .icon-sprite {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    .person-icon {
      display: block;
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      overflow: visible;
    }

    .page-links {
      display: inline-flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 100%;
    }

    .page-jump {
      min-height: 44px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, 0.94);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      box-shadow: 0 5px 0 var(--shadow);
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }

    .page-jump:hover {
      background: #ffffff;
    }

    .page-jump:focus-visible,
    .deploy-button:focus-visible,
    .number-button:focus-visible,
    .special-button:focus-visible,
    .panel-icon-button:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 2px;
    }

    .game-shell {
      width: min(1280px, 100%);
      min-height: calc(100vh - (clamp(8px, 2vh, 20px) * 2));
      min-height: calc(100dvh - (clamp(8px, 2vh, 20px) * 2));
      height: calc(100vh - (clamp(8px, 2vh, 20px) * 2));
      height: calc(100dvh - (clamp(8px, 2vh, 20px) * 2));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: var(--shell-gap);
    }

    .app-header,
    .control-bar,
    .battle-shell,
    .number-panel,
    .status-card {
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 8px 0 var(--shadow);
    }

    .app-header {
      min-height: 86px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      position: relative;
      border: 3px solid var(--line);
      border-radius: 7px;
      background:
        repeating-linear-gradient(90deg, #97a3a8 0 18px, #748188 18px 22px);
      box-shadow: inset 0 -9px 0 rgba(0, 0, 0, 0.1);
    }

    .brand-mark::before {
      content: "";
      position: absolute;
      left: -3px;
      right: -3px;
      top: -14px;
      height: 18px;
      border: 3px solid var(--line);
      background:
        linear-gradient(90deg, var(--stone-dark) 0 18%, transparent 18% 31%, var(--stone-dark) 31% 49%, transparent 49% 62%, var(--stone-dark) 62% 80%, transparent 80%);
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 21px;
      bottom: 0;
      width: 16px;
      height: 24px;
      border: 3px solid var(--line);
      border-bottom: 0;
      border-radius: 9px 9px 0 0;
      background: #5c4030;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.4vw, 2.35rem);
      line-height: 1.08;
    }

    .brand-text p {
      margin: 5px 0 0;
      color: var(--soft-ink);
      font-size: 0.98rem;
      font-weight: 700;
    }

    .status-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 6px 10px;
      border: 2px solid var(--line);
      border-radius: 7px;
      background: #f4ecd3;
      font-weight: 900;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .badge.alt {
      background: var(--sky);
    }

    .badge.warn {
      background: #ffe8bd;
    }

    .badge.version-badge {
      min-height: 30px;
      padding: 4px 8px;
      background: rgba(255, 253, 247, 0.82);
      color: var(--soft-ink);
      font-size: 0.78rem;
    }

    .badge.coin-badge {
      background: #fff3b7;
      transition: transform 140ms ease, background 140ms ease;
    }

    .battlefield .coin-badge {
      position: absolute;
      z-index: 16;
      top: 12px;
      right: 12px;
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.12);
      pointer-events: none;
    }

    .badge.coin-badge.is-pulsing {
      background: var(--gold);
      transform: translateY(2px) scale(1.04);
    }

    .game-area {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(220px, 250px) minmax(0, 1fr);
      gap: var(--shell-gap);
    }

    .battle-shell {
      min-width: 0;
      min-height: 0;
      padding: var(--panel-pad);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: var(--shell-gap);
      overflow: hidden;
    }

    .battle-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }

    .status-card {
      min-height: 64px;
      padding: 10px;
      box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.05);
    }

    .status-card.mission-card {
      display: grid;
      align-content: center;
    }

    .status-label {
      margin: 0 0 6px;
      color: var(--soft-ink);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .status-value {
      margin: 0;
      font-size: clamp(1.28rem, 2vw, 1.72rem);
      line-height: 1.12;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .meter {
      height: 18px;
      border: 2px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
      margin-top: 9px;
    }

    .meter span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--green);
      transition: width 160ms ease;
    }

    .meter.danger span {
      background: var(--warning);
    }

    .meter.health span {
      background: var(--green);
    }

    .meter.time-low span {
      background: var(--warning);
    }

    .castle-health-hud {
      position: absolute;
      z-index: 14;
      left: 12px;
      top: 54px;
      width: min(132px, calc(var(--wall-x) - 22px));
      min-width: 86px;
      padding: 6px 7px 7px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, 0.9);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.12);
    }

    .castle-health-hud .status-label {
      margin-bottom: 4px;
      font-size: 0.72rem;
    }

    .castle-health-hud .status-value {
      font-size: 1.05rem;
      line-height: 1;
    }

    .castle-health-hud .meter {
      height: 14px;
      margin-top: 6px;
    }

    .target-hud {
      position: absolute;
      z-index: 15;
      left: 59%;
      top: 14px;
      width: min(246px, 38%);
      min-height: 58px;
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, 0.94);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.12);
      transform: translateX(-50%);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .target-hud.is-empty {
      opacity: 0;
      transform: translateX(-50%) translateY(-4px) scale(0.96);
    }

    .target-hud-label {
      grid-column: 1 / -1;
      color: var(--soft-ink);
      font-size: 0.68rem;
      font-weight: 900;
      line-height: 1;
    }

    .target-hud-number {
      min-width: 30px;
      min-height: 30px;
      display: grid;
      place-items: center;
      border: 3px solid var(--line);
      border-radius: 7px;
      background: #fff3b7;
      font-size: 1.2rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .target-hud-pattern-shell {
      min-width: 70px;
      display: flex;
      justify-content: flex-start;
    }

    .target-pattern {
      --dot-size: 6px;
      gap: 2px;
      padding: 3px 4px;
      border: 2px solid rgba(45, 70, 64, 0.64);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.9);
    }

    .target-hud-progress {
      min-width: 34px;
      justify-self: end;
      padding: 2px 5px;
      border: 2px solid rgba(45, 70, 64, 0.56);
      border-radius: 7px;
      background: var(--mint);
      color: var(--green-deep);
      font-size: 0.72rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      text-align: center;
    }

    .target-hud-progress:empty {
      display: none;
    }

    .battlefield {
      --wall-x: 18%;
      position: relative;
      height: 100%;
      min-height: 0;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background:
        linear-gradient(180deg, #cfeefa 0 44%, #bcdba3 44% 100%);
      isolation: isolate;
    }

    .battlefield.is-shaking {
      animation: battlefieldShake 420ms ease;
    }

    .battlefield.is-heavy-shaking {
      animation: battlefieldHeavyShake 720ms ease;
    }

    .cloud-bank {
      position: absolute;
      inset: 18px 22px auto 19%;
      height: 54px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.72) 0 18%, transparent 18% 23%, rgba(255, 255, 255, 0.72) 23% 39%, transparent 39% 48%, rgba(255, 255, 255, 0.72) 48% 62%, transparent 62%);
      border-radius: 7px;
      opacity: 0.66;
      pointer-events: none;
    }

    .far-hills {
      position: absolute;
      left: 12%;
      right: -6%;
      top: 110px;
      height: 150px;
      background:
        linear-gradient(135deg, transparent 0 32%, #8ebc73 32% 52%, transparent 52%),
        linear-gradient(225deg, transparent 0 38%, #7daf6d 38% 58%, transparent 58%);
      opacity: 0.72;
      pointer-events: none;
    }

    .field-grid {
      position: absolute;
      inset: 40% 0 0 var(--wall-x);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px) 0 0 / 70px 70px,
        linear-gradient(0deg, rgba(255, 255, 255, 0.18) 1px, transparent 1px) 0 0 / 70px 70px;
      pointer-events: none;
    }

    .lane {
      position: absolute;
      left: var(--wall-x);
      right: 0;
      height: 18px;
      border-top: 3px solid rgba(45, 70, 64, 0.32);
      background: rgba(255, 253, 247, 0.24);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .lane.one {
      top: 40%;
    }

    .lane.two {
      top: 53%;
    }

    .lane.three {
      top: 66%;
    }

    .lane.four {
      top: 79%;
    }

    .castle-wall {
      position: absolute;
      z-index: 6;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--wall-x);
      border-right: 3px solid var(--line);
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.1) 0 34px, rgba(0, 0, 0, 0.08) 34px 38px),
        repeating-linear-gradient(90deg, #9ca8ac 0 38px, #7f8d93 38px 43px);
      box-shadow: inset -12px 0 0 rgba(0, 0, 0, 0.1);
    }

    .castle-wall::before {
      content: "";
      position: absolute;
      left: 0;
      right: -3px;
      top: 0;
      height: 48px;
      border-bottom: 3px solid var(--line);
      background:
        linear-gradient(90deg, var(--stone-dark) 0 17%, transparent 17% 29%, var(--stone-dark) 29% 46%, transparent 46% 58%, var(--stone-dark) 58% 75%, transparent 75% 87%, var(--stone-dark) 87%);
    }

    .castle-gate {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(76px, 62%);
      height: 120px;
      border: 3px solid var(--line);
      border-bottom: 0;
      border-radius: 40px 40px 0 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 72%, rgba(240, 195, 78, 0.38) 0 15%, transparent 36%),
        #24342f;
      transform: translateX(-50%);
      box-shadow:
        inset 0 10px 0 rgba(255, 255, 255, 0.08),
        inset 0 -12px 0 rgba(0, 0, 0, 0.18);
      transform-origin: 50% 100%;
      transition: box-shadow 220ms ease;
      z-index: 2;
    }

    .castle-gate::before,
    .castle-gate::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: -2px;
      z-index: 2;
      width: 54%;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 12%, transparent 12% 88%, rgba(0, 0, 0, 0.16) 88%),
        repeating-linear-gradient(90deg, #6f4a30 0 16px, #553623 16px 21px);
      box-shadow: inset 0 10px 0 rgba(255, 255, 255, 0.08);
      transition: transform 520ms cubic-bezier(0.2, 0.82, 0.12, 1);
    }

    .castle-gate::before {
      left: 0;
      border-right: 3px solid rgba(38, 31, 24, 0.7);
      transform-origin: left center;
    }

    .castle-gate::after {
      right: 0;
      border-left: 3px solid rgba(38, 31, 24, 0.7);
      transform-origin: right center;
    }

    .castle-wall.is-treasure-countdown .castle-gate {
      animation: gateRattle 520ms ease-in-out infinite;
      box-shadow:
        inset 0 10px 0 rgba(255, 255, 255, 0.08),
        inset 0 -12px 0 rgba(0, 0, 0, 0.18),
        0 0 0 4px rgba(240, 195, 78, 0.16);
    }

    .castle-wall.is-treasure-open .castle-gate::before {
      transform: translateX(-70%) rotate(-7deg) skewY(4deg);
    }

    .castle-wall.is-treasure-open .castle-gate::after {
      transform: translateX(70%) rotate(7deg) skewY(-4deg);
    }

    .treasure-countdown {
      position: absolute;
      z-index: 5;
      left: 50%;
      top: 46%;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 3px solid var(--line);
      border-radius: 50%;
      background: var(--gold);
      color: #2f2a21;
      font-size: 1.35rem;
      font-weight: 900;
      line-height: 1;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.66);
      box-shadow:
        inset 0 -5px 0 rgba(0, 0, 0, 0.16),
        0 5px 0 rgba(0, 0, 0, 0.14);
      pointer-events: none;
    }

    .castle-wall.is-treasure-countdown .treasure-countdown {
      opacity: 1;
      animation: treasureCountdownPulse 1000ms ease-in-out infinite;
    }

    .treasure-chest {
      position: absolute;
      left: 50%;
      bottom: 18px;
      z-index: 4;
      width: min(58px, 52%);
      height: 46px;
      display: block;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(14px) scale(0.78);
      transition: opacity 180ms ease, transform 260ms ease;
    }

    .castle-wall.is-treasure-open .treasure-chest {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
      animation: treasurePeek 1200ms ease-in-out infinite;
    }

    .treasure-chest:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 4px;
      border-radius: 8px;
    }

    .treasure-chest::before,
    .treasure-chest::after {
      content: "";
      position: absolute;
      left: 50%;
      border: 3px solid var(--line);
      transform: translateX(-50%);
    }

    .treasure-chest::before {
      bottom: 19px;
      width: 50px;
      height: 24px;
      border-radius: 23px 23px 7px 7px;
      background:
        linear-gradient(90deg, transparent 0 42%, rgba(255, 255, 255, 0.42) 42% 58%, transparent 58%),
        linear-gradient(#d99145 0 52%, #9f5b35 53%);
      box-shadow: inset 0 -6px 0 rgba(0, 0, 0, 0.16);
    }

    .treasure-chest::after {
      bottom: 0;
      width: 54px;
      height: 26px;
      border-radius: 6px;
      background:
        linear-gradient(90deg, transparent 0 42%, var(--gold) 42% 58%, transparent 58%),
        linear-gradient(#b96d3f 0 50%, #7a432c 51%);
      box-shadow:
        inset 0 7px 0 rgba(255, 255, 255, 0.14),
        inset 0 -7px 0 rgba(0, 0, 0, 0.18),
        0 5px 0 rgba(0, 0, 0, 0.16);
    }

    .soldier {
      position: absolute;
      z-index: 8;
      left: 52%;
      width: 46px;
      height: 56px;
      transform: translateX(-50%);
      color: var(--line);
      filter: drop-shadow(0 4px 0 rgba(0, 0, 0, 0.16));
    }

    .soldier.one {
      top: 29%;
    }

    .soldier.two {
      top: 42%;
    }

    .soldier.three {
      top: 55%;
    }

    .soldier.four {
      top: 68%;
    }

    .soldier-person {
      position: absolute;
      left: 2px;
      top: 0;
      width: 39px;
      height: 43px;
      padding: 3px;
      border: 3px solid var(--line);
      border-radius: 13px;
      background: #ddeaf4;
      box-shadow: inset 0 -6px 0 rgba(0, 0, 0, 0.11);
      box-sizing: border-box;
    }

    .soldier-bow {
      position: absolute;
      right: -18px;
      top: 16px;
      width: 30px;
      height: 30px;
      color: var(--wood-dark);
      stroke-width: 2.7;
      transform: rotate(11deg);
    }

    .enemy-layer,
    .arrow-layer,
    .floating-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .enemy-layer {
      z-index: 5;
    }

    .arrow-layer {
      z-index: 9;
    }

    .floating-layer {
      z-index: 12;
    }

    .enemy {
      position: absolute;
      width: 82px;
      height: 96px;
      left: 100%;
      top: 50%;
      transform: translate(-50%, -64%);
      filter: drop-shadow(0 6px 0 rgba(0, 0, 0, 0.14));
      transition: filter 120ms ease;
    }

    .enemy.is-hit {
      animation: enemyDefeat 780ms ease forwards;
      filter: drop-shadow(0 8px 0 rgba(0, 0, 0, 0.08));
    }

    .enemy.is-low {
      animation: enemyLow 440ms ease;
    }

    .enemy.is-over {
      animation: enemyOver 500ms ease;
    }

    .enemy.is-at-castle .enemy-figure {
      animation: enemyCastleAttack 760ms ease-in-out infinite;
      background: linear-gradient(#efb086 0 50%, #c86d4f 51%);
    }

    .enemy-figure {
      position: absolute;
      left: 8px;
      top: 2px;
      width: 66px;
      height: 78px;
      display: grid;
      place-items: center;
      border: 3px solid var(--line);
      border-radius: 18px 18px 10px 10px;
      background: linear-gradient(#d8835c 0 52%, #704047 53%);
      box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.12);
      z-index: 1;
    }

    .enemy-creature {
      position: relative;
      display: block;
      width: 56px;
      height: 64px;
    }

    .enemy-creature .person-icon {
      position: absolute;
    }

    .enemy-creature-sword {
      left: 8%;
      top: 8%;
      width: 84%;
      height: 72%;
      color: #ffe08b;
      stroke-width: 2.15;
      transform: rotate(-28deg);
      transform-origin: 50% 50%;
    }

    .enemy-creature-shield {
      left: 16%;
      top: 25%;
      width: 68%;
      height: 68%;
      color: #263f39;
      stroke-width: 2.35;
    }

    .enemy-creature-skull {
      left: 24%;
      top: 4%;
      width: 52%;
      height: 48%;
      color: #fff3b7;
      stroke-width: 2.45;
      filter: drop-shadow(0 2px 0 rgba(38, 50, 56, 0.42));
    }

    .enemy.is-big {
      width: 116px;
      height: 154px;
      transform: translate(-50%, -58%);
      filter: drop-shadow(0 9px 0 rgba(0, 0, 0, 0.18));
    }

    .enemy.is-big .enemy-figure {
      left: 8px;
      top: 0;
      width: 100px;
      height: 146px;
      border-radius: 22px 22px 12px 12px;
      background: linear-gradient(#bf6f69 0 48%, #6b4b64 49%);
      box-shadow:
        inset 0 -12px 0 rgba(0, 0, 0, 0.14),
        inset 0 10px 0 rgba(255, 255, 255, 0.18);
    }

    .enemy.is-big .enemy-creature {
      width: 86px;
      height: 104px;
      opacity: 0.42;
      transform: translateY(22px);
    }

    .enemy-slots {
      position: absolute;
      z-index: 4;
      left: 50%;
      top: 12px;
      width: 82px;
      display: grid;
      gap: 5px;
      transform: translateX(-50%);
    }

    .enemy-slot {
      min-height: 38px;
      display: grid;
      grid-template-columns: 26px 1fr;
      align-items: center;
      gap: 4px;
      padding: 3px 4px;
      border: 3px solid var(--line);
      border-radius: 7px;
      background: #fff3b7;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.12);
      transition: background 140ms ease, transform 140ms ease, opacity 140ms ease;
    }

    .enemy-slot.is-active {
      background: #ffffff;
      transform: translateX(-3px);
    }

    .enemy-slot.is-filled {
      background: var(--mint);
      transform: translateX(0);
    }

    .enemy-slot-number {
      display: grid;
      place-items: center;
      font-size: 1.05rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .enemy-slot.is-filled .enemy-slot-number {
      opacity: 0;
    }

    .enemy-slot-pattern {
      --dot-size: 3px;
      gap: 2px;
      justify-self: center;
    }

    .enemy-number {
      position: absolute;
      left: 50%;
      top: 29px;
      min-width: 42px;
      min-height: 32px;
      display: grid;
      place-items: center;
      border: 3px solid var(--line);
      border-radius: 7px;
      background: #fff3b7;
      font-size: 1.15rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      transform: translateX(-50%);
      z-index: 4;
    }

    .count-pattern {
      --dot-size: 8px;
      display: grid;
      grid-template-columns: repeat(5, var(--dot-size));
      grid-template-rows: repeat(2, var(--dot-size));
      gap: 3px;
      justify-content: center;
      align-items: center;
    }

    .count-dot {
      width: var(--dot-size);
      height: var(--dot-size);
      border: 2px solid var(--line);
      border-radius: 50%;
      background: #ffffff;
      transition: background 130ms ease, border-color 130ms ease, transform 130ms ease, opacity 130ms ease;
    }

    .count-dot.is-filled {
      background:
        radial-gradient(circle at 34% 30%, rgba(255, 255, 255, 0.78) 0 18%, transparent 38%),
        var(--gold);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.14);
      transform: scale(1.06);
    }

    .count-dot.is-empty {
      border-style: dashed;
      opacity: 0.44;
    }

    .enemy-pattern {
      --dot-size: 6px;
      position: absolute;
      left: 50%;
      top: 63px;
      padding: 4px;
      border: 2px solid var(--line);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.9);
      transform: translateX(-50%);
      z-index: 4;
    }

    .shot-burst {
      position: absolute;
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      transform-origin: 50% 50%;
    }

    .shot-dot,
    .spill-dot {
      width: 11px;
      height: 11px;
      border: 2px solid var(--line);
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.82) 0 14%, transparent 34%),
        var(--gold);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.15);
      flex: 0 0 auto;
    }

    .shot-zero {
      min-width: 22px;
      min-height: 22px;
      display: grid;
      place-items: center;
      border: 2px dashed var(--line);
      border-radius: 50%;
      background: #ffffff;
      color: var(--soft-ink);
      font-weight: 900;
      line-height: 1;
    }

    .floating-text {
      position: absolute;
      min-width: 64px;
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 4px 8px;
      border: 3px solid var(--line);
      border-radius: 7px;
      background: #e3f5d7;
      font-weight: 900;
      transform: translate(-50%, -50%);
      box-shadow: 0 5px 0 rgba(0, 0, 0, 0.12);
    }

    .floating-text.miss {
      background: #ffe8bd;
    }

    .floating-text.low {
      background: #fff3b7;
    }

    .floating-text.over {
      background: #ffd9d6;
    }

    .floating-text.ok {
      background: #e3f5d7;
    }

    .floating-text.coin {
      min-width: 48px;
      min-height: 48px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.82) 0 12%, transparent 32%),
        var(--gold);
      color: #3e3120;
      box-shadow:
        inset 0 -6px 0 rgba(0, 0, 0, 0.15),
        0 6px 0 rgba(0, 0, 0, 0.12);
    }

    .floating-text.coin-mini {
      min-width: 24px;
      min-height: 24px;
      padding: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.82) 0 14%, transparent 34%),
        var(--gold);
      color: transparent;
      box-shadow:
        inset 0 -4px 0 rgba(0, 0, 0, 0.15),
        0 4px 0 rgba(0, 0, 0, 0.12);
    }

    .floating-text.coin-spend {
      min-width: 48px;
      min-height: 40px;
      background: #ffe8bd;
      color: #704229;
    }

    .floating-text.wave {
      min-width: 110px;
      background: #fff3b7;
      color: #3e3120;
    }

    .floating-text.meteor {
      min-width: 0;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .meteor-rock {
      width: 30px;
      height: 30px;
      display: block;
      border: 3px solid var(--line);
      border-radius: 50% 44% 55% 42%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.75) 0 11%, transparent 30%),
        #6b4b43;
      box-shadow:
        -16px -13px 0 -6px var(--gold),
        -25px -22px 0 -10px #f2a15f,
        inset 0 -6px 0 rgba(0, 0, 0, 0.24);
      transform: rotate(-28deg);
    }

    .floating-text.snipe-impact,
    .floating-text.blast {
      min-width: 0;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .snipe-impact-mark {
      width: 84px;
      height: 84px;
      display: block;
      position: relative;
      border: 4px solid var(--warning);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(240, 195, 78, 0.92) 0 13%, rgba(215, 85, 85, 0.62) 14% 24%, transparent 25%),
        conic-gradient(from 0deg, transparent 0 12%, rgba(215, 85, 85, 0.78) 12% 15%, transparent 15% 35%, rgba(215, 85, 85, 0.78) 35% 38%, transparent 38% 62%, rgba(215, 85, 85, 0.78) 62% 65%, transparent 65% 85%, rgba(215, 85, 85, 0.78) 85% 88%, transparent 88%);
      animation: snipeImpact 620ms ease-out forwards;
    }

    .snipe-impact-mark::before,
    .snipe-impact-mark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: var(--warning);
      border-radius: 999px;
      transform: translate(-50%, -50%);
    }

    .snipe-impact-mark::before {
      width: 96px;
      height: 5px;
    }

    .snipe-impact-mark::after {
      width: 5px;
      height: 96px;
    }

    .blast-mark {
      width: 108px;
      height: 108px;
      display: block;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 250, 240, 0.95) 0 12%, var(--gold) 13% 26%, rgba(215, 85, 85, 0.88) 27% 42%, transparent 43%),
        conic-gradient(from 12deg, rgba(255, 232, 189, 0.9) 0 8%, transparent 8% 14%, rgba(242, 161, 95, 0.9) 14% 24%, transparent 24% 38%, rgba(255, 232, 189, 0.9) 38% 48%, transparent 48% 62%, rgba(242, 161, 95, 0.9) 62% 76%, transparent 76% 86%, rgba(255, 232, 189, 0.9) 86% 100%);
      filter: drop-shadow(0 8px 0 rgba(0, 0, 0, 0.16));
      animation: blastImpact 720ms ease-out forwards;
    }

    .floating-text.spill {
      min-width: 0;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      box-shadow: none;
    }

    .number-panel {
      min-width: 0;
      min-height: 0;
      padding: var(--panel-pad);
      display: grid;
      grid-template-rows: auto 1fr;
      justify-items: center;
      align-content: start;
      gap: var(--panel-gap);
      overflow: hidden;
    }

    .panel-actions {
      width: 196px;
      max-width: 100%;
      display: grid;
      grid-template-columns: var(--deploy-size) var(--tool-width) var(--tool-width);
      gap: var(--panel-gap);
      align-items: stretch;
      justify-content: center;
    }

    .deploy-button {
      width: var(--deploy-size);
      min-height: var(--deploy-size);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--green);
      color: #ffffff;
      display: grid;
      place-items: center;
      box-shadow: 0 5px 0 var(--shadow);
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    .deploy-button:hover {
      background: var(--green-deep);
    }

    .deploy-button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--shadow);
    }

    .deploy-button:disabled {
      cursor: default;
      opacity: 0.68;
      transform: none;
      box-shadow: none;
    }

    .deploy-icon {
      width: 1em;
      height: 1em;
      display: grid;
      place-items: center;
      font-family: system-ui, "Apple Color Emoji", "Segoe UI Symbol", sans-serif;
      font-size: clamp(2.1rem, 5.3vh, 3.2rem);
      font-weight: 900;
      line-height: 1;
    }

    .deploy-icon::before {
      content: "";
      display: block;
      width: 0.78em;
      height: 0.78em;
      background: #fffdf7;
      clip-path: polygon(28% 16%, 28% 84%, 82% 50%);
    }

    .panel-icon-button {
      width: var(--tool-width);
      min-height: var(--deploy-size);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--ink);
      display: grid;
      place-items: center;
      box-shadow: 0 5px 0 var(--shadow);
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    .panel-icon-button:hover {
      background: var(--mint);
    }

    .panel-icon-button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--shadow);
    }

    .panel-icon-button:disabled {
      cursor: default;
      opacity: 0.48;
      transform: none;
      box-shadow: none;
    }

    .pause-icon,
    .reset-icon {
      width: 1em;
      height: 1em;
      display: grid;
      place-items: center;
      font-family: system-ui, "Apple Color Emoji", "Segoe UI Symbol", sans-serif;
      font-size: clamp(1.7rem, 3.8vh, 2.25rem);
      font-weight: 900;
      line-height: 1;
    }

    .pause-icon::before {
      content: "⏸";
      color: var(--line);
    }

    .panel-icon-button[data-mode="resume"] .pause-icon::before {
      content: "▶";
      color: var(--green-deep);
      transform: translateX(0.06em);
    }

    .reset-icon::before {
      content: "↻";
      color: var(--line);
    }

    .number-grid {
      width: 146px;
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--button-gap);
      align-content: start;
      justify-self: center;
    }

    .number-button {
      width: 146px;
      min-width: 146px;
      min-height: var(--number-row-height);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      display: grid;
      grid-template-columns: 34px auto;
      align-items: center;
      justify-content: start;
      justify-items: start;
      gap: 3px;
      padding: clamp(3px, 0.7vh, 6px) 8px;
      box-shadow: 0 5px 0 var(--shadow);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .button-number {
      font-size: clamp(1.08rem, 2.5vh, 1.36rem);
      line-height: 1;
      justify-self: center;
    }

    .button-pattern {
      --dot-size: clamp(4px, 0.66vh, 6px);
      justify-self: start;
      padding: clamp(2px, 0.38vh, 3px) 4px;
      border: 2px solid rgba(45, 70, 64, 0.6);
      border-radius: 7px;
      background: rgba(255, 250, 240, 0.82);
    }

    .number-button:hover {
      background: var(--mint);
    }

    .number-button:active,
    .number-button.is-active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--shadow);
      background: var(--green);
      color: #ffffff;
    }

    .special-button {
      width: 146px;
      min-width: 146px;
      min-height: var(--special-row-height);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: #fff3b7;
      color: var(--ink);
      display: grid;
      grid-template-columns: 30px 1fr;
      grid-template-rows: auto auto;
      align-items: center;
      column-gap: 7px;
      padding: clamp(4px, 0.7vh, 6px) 8px;
      box-shadow: 0 5px 0 var(--shadow);
      font-weight: 900;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    .special-button.meteor {
      background: #ffd9d6;
    }

    .special-button:hover {
      background: var(--mint);
    }

    .special-button:active,
    .special-button.is-active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 var(--shadow);
    }

    .special-button:disabled {
      cursor: default;
      opacity: 0.46;
      transform: none;
      box-shadow: none;
    }

    .special-icon {
      grid-row: 1 / 3;
      width: clamp(22px, 3.4vh, 28px);
      height: clamp(22px, 3.4vh, 28px);
      display: block;
      position: relative;
      justify-self: center;
    }

    .special-icon.snipe::before,
    .special-icon.snipe::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: var(--line);
    }

    .special-icon.snipe::before {
      left: 4px;
      right: 4px;
      top: 12px;
      height: 4px;
      box-shadow: 0 0 0 3px #fffaf0;
    }

    .special-icon.snipe::after {
      top: 4px;
      bottom: 4px;
      left: 12px;
      width: 4px;
    }

    .special-icon.meteor::before {
      content: "";
      position: absolute;
      right: 3px;
      bottom: 2px;
      width: 16px;
      height: 16px;
      border: 3px solid var(--line);
      border-radius: 50%;
      background: #6b4b43;
    }

    .special-icon.meteor::after {
      content: "";
      position: absolute;
      left: 1px;
      top: 1px;
      width: 23px;
      height: 9px;
      border-radius: 999px;
      background: var(--gold);
      transform: rotate(-35deg);
    }

    .special-icon.repair::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 15px;
      width: 20px;
      height: 9px;
      border: 3px solid var(--line);
      border-radius: 4px;
      background: #9ca8ac;
      transform: rotate(-42deg);
    }

    .special-icon.repair::after {
      content: "";
      position: absolute;
      right: 2px;
      top: 2px;
      width: 12px;
      height: 12px;
      border: 3px solid var(--line);
      border-radius: 50%;
      background: #fffaf0;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.12);
    }

    .special-label {
      font-size: clamp(0.72rem, 1.55vh, 0.86rem);
      line-height: 1.05;
    }

    .special-cost {
      color: var(--soft-ink);
      font-size: clamp(0.64rem, 1.35vh, 0.72rem);
      line-height: 1.05;
    }

    .control-bar {
      min-height: clamp(50px, 7.2vh, 72px);
      padding: var(--panel-pad);
      display: grid;
      grid-template-columns: minmax(120px, 1fr) auto;
      align-items: center;
      gap: 12px;
    }

    .phase-text {
      color: var(--soft-ink);
      font-weight: 900;
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
      }

      .page-links {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        max-width: none;
      }

      .page-jump {
        width: 100%;
      }

      .game-shell {
        min-height: calc(100vh - 20px);
      }

      .app-header {
        grid-template-columns: 1fr;
        padding-right: 18px;
      }

      .status-strip {
        justify-content: flex-start;
      }

      .game-area {
        grid-template-columns: 1fr;
      }

      .number-panel {
        grid-template-columns: auto minmax(146px, 1fr);
        grid-template-rows: auto;
        justify-items: start;
      }

      .panel-actions {
        grid-column: 1;
        grid-row: 1;
      }

      .number-grid {
        grid-column: 2;
        grid-row: 1;
        width: 146px;
        grid-template-columns: 1fr;
        align-content: start;
        justify-self: start;
      }

      .control-bar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-height: 700px) and (min-width: 821px) {
      :root {
        --shell-gap: 7px;
        --panel-pad: 7px;
        --panel-gap: 5px;
        --button-gap: 4px;
        --deploy-size: 44px;
        --tool-width: 40px;
        --number-row-height: 30px;
        --special-row-height: 34px;
      }

      .app-header {
        min-height: 64px;
        padding: 8px 12px;
      }

      .brand {
        gap: 10px;
      }

      .brand-mark {
        width: 48px;
        height: 48px;
      }

      .brand-text p {
        display: none;
      }

      .status-card {
        min-height: 52px;
        padding: 7px 9px;
      }

      .status-label {
        margin-bottom: 3px;
      }

      .status-value {
        font-size: 1.22rem;
      }

      .meter {
        height: 13px;
        margin-top: 5px;
      }

      .control-bar {
        min-height: 44px;
      }
    }

    @media (max-height: 620px) and (min-width: 821px) {
      .app-header {
        min-height: 56px;
        padding-block: 6px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
      }

      .brand-text h1 {
        font-size: 1.35rem;
      }

      .badge {
        min-height: 30px;
        padding: 4px 8px;
      }

    }

    @media (max-width: 720px) {
      :root {
        --shell-gap: 6px;
        --panel-pad: 6px;
        --panel-gap: 5px;
        --button-gap: 4px;
        --deploy-size: 44px;
        --tool-width: 40px;
        --number-row-height: 36px;
        --special-row-height: 42px;
      }

      body {
        padding: 6px;
      }

      .game-shell {
        height: calc(100vh - 12px);
        height: calc(100dvh - 12px);
        min-height: 0;
        gap: var(--shell-gap);
      }

      .app-header {
        min-height: 0;
        gap: 6px;
        padding: 8px 10px;
      }

      .brand {
        gap: 9px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
      }

      .brand-mark::before {
        top: -11px;
        height: 14px;
      }

      .brand-mark::after {
        left: 15px;
        width: 13px;
        height: 18px;
      }

      .brand-text h1 {
        font-size: 1.38rem;
      }

      .brand-text p {
        display: none;
      }

      .status-strip {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
      }

      .badge {
        min-width: 0;
        min-height: 28px;
        justify-content: center;
        overflow: hidden;
        padding: 3px 4px;
        font-size: 0.72rem;
        text-overflow: ellipsis;
      }

      .badge.version-badge {
        min-height: 28px;
        font-size: 0.62rem;
      }

      .page-links {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 5px;
      }

      .page-jump {
        min-height: 32px;
        padding: 0 4px;
        border-width: 2px;
        box-shadow: 0 3px 0 var(--shadow);
        font-size: 0.72rem;
      }

      .game-area {
        grid-template-areas:
          "battle"
          "controls";
        grid-template-rows: minmax(220px, 1fr) auto;
        gap: var(--shell-gap);
      }

      .battle-shell {
        grid-area: battle;
        padding: var(--panel-pad);
        gap: var(--shell-gap);
      }

      .status-card {
        min-height: 52px;
        padding: 7px 9px;
      }

      .status-label {
        margin-bottom: 3px;
        font-size: 0.74rem;
      }

      .status-value {
        font-size: 1.22rem;
      }

      .meter {
        height: 12px;
        margin-top: 5px;
      }

      .number-panel {
        grid-area: controls;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        gap: var(--panel-gap);
        padding: var(--panel-pad);

    function getAudioContext() {
      if (!audioState.supported) {
        return null;
      }

      if (!audioState.context) {
        const AudioContextConstructor = window.AudioContext || window.webkitAudioContext;

        try {
          audioState.context = new AudioContextConstructor();
        } catch (error) {
          audioState.supported = false;
          return null;
        }
      }

      return audioState.context;

    function resumeAudioContext(context) {
      if (!context || context.state !== "suspended" || typeof context.resume !== "function") {
        return null;
      }

      if (audioState.resumePromise) {
        return audioState.resumePromise;
      }

      try {
        const resume = context.resume();

        if (resume && typeof resume.then === "function") {
          audioState.resumePromise = resume.then(() => {
            audioState.resumePromise = null;
            return context;
          }).catch((error) => {
            audioState.resumePromise = null;
            throw error;
          });
          return audioState.resumePromise;
        }
      } catch (error) {
        audioState.supported = false;
      }

      return null;
    }

    function safelyPlaySound(play, fallback = null) {
      const context = getAudioContext();
      const playFallback = () => {
        if (typeof fallback === "function") {
          fallback();
        }
      };

      if (!context) {
        playFallback();
        return false;
      }

      const playNow = () => {
        try {
          play(context);
          return true;
        } catch (error) {
          audioState.supported = false;
          playFallback();
          return false;
        }
      };

      if (context.state === "suspended") {
        const resume = resumeAudioContext(context);

        if (resume && typeof resume.then === "function") {
          let usedFallback = false;
          const fallbackTimer = typeof fallback === "function"
            ? setTimeout(() => {
              if (context.state !== "running") {
                usedFallback = true;
                playFallback();
              }
            }, 180)
            : null;

          resume.then(() => {
            if (fallbackTimer) {
              clearTimeout(fallbackTimer);
            }

            if (usedFallback) {
              return;
            }

            if (context.state === "running") {
              playNow();
            } else {
              playFallback();
            }
          }).catch(() => {
            if (fallbackTimer) {
              clearTimeout(fallbackTimer);
            }

            if (!usedFallback) {
              playFallback();
            }
          });

          return true;
        }

        if (context.state === "suspended") {
          playFallback();
          return false;
        }
      }

      return playNow();
    }

    function writeAscii(view, offset, text) {
      for (let index = 0; index < text.length; index += 1) {
        view.setUint8(offset + index, text.charCodeAt(index));
      }
    }

    function createMissBuzzerAudioUrl() {
      if (typeof Blob === "undefined" || typeof URL === "undefined" || typeof URL.createObjectURL !== "function") {
        throw new Error("Blob audio is not supported");
      }

      const sampleRate = 22050;
      const duration = 0.42;
      const sampleCount = Math.floor(sampleRate * duration);
      const bytesPerSample = 2;
      const buffer = new ArrayBuffer(44 + sampleCount * bytesPerSample);
      const view = new DataView(buffer);

      writeAscii(view, 0, "RIFF");
      view.setUint32(4, 36 + sampleCount * bytesPerSample, true);
      writeAscii(view, 8, "WAVE");
      writeAscii(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * bytesPerSample, true);
      view.setUint16(32, bytesPerSample, true);
      view.setUint16(34, 16, true);
      writeAscii(view, 36, "data");
      view.setUint32(40, sampleCount * bytesPerSample, true);

      for (let index = 0; index < sampleCount; index += 1) {
        const time = index / sampleRate;
        const secondPulse = time > 0.2;
        const pulseTime = secondPulse ? time - 0.2 : time;
        const envelope = pulseTime < 0.17 ? Math.max(0, 1 - pulseTime / 0.17) : 0;
        const frequency = secondPulse
          ? 190 - pulseTime * 460
          : 240 - pulseTime * 520;
        const square = Math.sin(Math.PI * 2 * frequency * time) >= 0 ? 1 : -1;
        const grit = Math.sin(index * 12.9898) * 0.16;
        const sample = clamp((square * 0.82 + grit) * envelope * 0.62, -1, 1);
        view.setInt16(44 + index * bytesPerSample, Math.round(sample * 32767), true);
      }

      return URL.createObjectURL(new Blob([view], { type: "audio/wav" }));
    }

    function createBigHitAudioUrl() {
      if (typeof Blob === "undefined" || typeof URL === "undefined" || typeof URL.createObjectURL !== "function") {
        throw new Error("Blob audio is not supported");
      }

      const sampleRate = 22050;
      const duration = 0.32;
      const sampleCount = Math.floor(sampleRate * duration);
      const bytesPerSample = 2;
      const buffer = new ArrayBuffer(44 + sampleCount * bytesPerSample);
      const view = new DataView(buffer);

      writeAscii(view, 0, "RIFF");
      view.setUint32(4, 36 + sampleCount * bytesPerSample, true);
      writeAscii(view, 8, "WAVE");
      writeAscii(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * bytesPerSample, true);
      view.setUint16(32, bytesPerSample, true);
      view.setUint16(34, 16, true);
      writeAscii(view, 36, "data");
      view.setUint32(40, sampleCount * bytesPerSample, true);

      for (let index = 0; index < sampleCount; index += 1) {
        const time = index / sampleRate;
        const envelope = Math.exp(-time * 10.5);
        const clang = Math.sin(Math.PI * 2 * 760 * time) * Math.exp(-time * 18);
        const body = Math.sin(Math.PI * 2 * 118 * time) * Math.exp(-time * 7);
        const edge = Math.sin(index * 31.713) * Math.exp(-time * 24) * 0.35;
        const sample = clamp((clang * 0.46 + body * 0.58 + edge) * envelope, -1, 1);
        view.setInt16(44 + index * bytesPerSample, Math.round(sample * 32767), true);
      }

      return URL.createObjectURL(new Blob([view], { type: "audio/wav" }));
    }

    function createTone(context, options) {
      const oscillator = context.createOscillator();
      const volume = context.createGain();
      const startedAt = context.currentTime + (options.start || 0);
      const endedAt = startedAt + options.duration;
      const peakAt = Math.min(startedAt + 0.014, endedAt - 0.004);
      const endFrequency = options.endFrequency || options.frequency;

      oscillator.type = options.type || "sine";
      oscillator.frequency.setValueAtTime(options.frequency, startedAt);

      if (endFrequency !== options.frequency) {
        oscillator.frequency.exponentialRampToValueAtTime(Math.max(1, endFrequency), endedAt);
      }

      volume.gain.setValueAtTime(0.0001, startedAt);
      volume.gain.exponentialRampToValueAtTime(Math.max(0.0001, options.gain), peakAt);
      volume.gain.exponentialRampToValueAtTime(0.0001, endedAt);

      oscillator.connect(volume);
      volume.connect(context.destination);
      oscillator.start(startedAt);
      oscillator.stop(endedAt + 0.02);
      oscillator.addEventListener("ended", () => {
        oscillator.disconnect();
        volume.disconnect();
      }, { once: true });
    }

    function createNoiseBurst(context, options) {
      const duration = options.duration || 0.1;
      const bufferSize = Math.max(1, Math.floor(context.sampleRate * duration));
      const buffer = context.createBuffer(1, bufferSize, context.sampleRate);
      const data = buffer.getChannelData(0);
      const source = context.createBufferSource();
      const filter = context.createBiquadFilter();
      const volume = context.createGain();
      const startedAt = context.currentTime + (options.start || 0);
      const endedAt = startedAt + duration;

      for (let index = 0; index < bufferSize; index += 1) {
        const fade = 1 - index / bufferSize;
        data[index] = (Math.random() * 2 - 1) * fade;
      }

      source.buffer = buffer;
      filter.type = options.filterType || "bandpass";
      filter.frequency.setValueAtTime(options.frequency || 900, startedAt);
      filter.Q.setValueAtTime(options.q || 0.8, startedAt);
      volume.gain.setValueAtTime(0.0001, startedAt);
      volume.gain.exponentialRampToValueAtTime(Math.max(0.0001, options.gain || 0.03), startedAt + 0.012);
      volume.gain.exponentialRampToValueAtTime(0.0001, endedAt);

      source.connect(filter);
      filter.connect(volume);
      volume.connect(context.destination);
      source.start(startedAt);
      source.stop(endedAt + 0.02);
      source.addEventListener("ended", () => {
        source.disconnect();
        filter.disconnect();
        volume.disconnect();
      }, { once: true });
    }

        try {

          source.buffer = context.createBuffer(1, 1, context.sampleRate);
          volume.gain.setValueAtTime(0.0001, context.currentTime);
          source.connect(volume);
