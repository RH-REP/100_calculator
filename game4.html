    function nextWaveLabel() {
      return `第${state.wave + 1}ウェーブ`;
    }

    function remainingMissionSeconds() {
      return Math.max(0, Math.ceil(waveDurationSeconds - state.elapsed));
    }

    function missionRemainingRatio() {
      return clamp((waveDurationSeconds - state.elapsed) / waveDurationSeconds, 0, 1);
    }

    function isFilledDot(index, value, fillMode = "front") {
      const count = clamp(value, 0, 10);
      return fillMode === "back" ? index >= 10 - count : index < count;
    }

    function setPatternValue(pattern, value) {
      const fillMode = pattern.dataset.fillMode || "front";
      pattern.querySelectorAll(".count-dot").forEach((dot, index) => {
        const isFilled = isFilledDot(index, value, fillMode);
        dot.className = `count-dot ${isFilled ? "is-filled" : "is-empty"}`;
      });
      pattern.dataset.value = String(clamp(value, 0, 10));
    }

    function createCountPattern(value, extraClass = "", fillMode = "front") {
      const pattern = document.createElement("span");
      pattern.className = ["count-pattern", extraClass].filter(Boolean).join(" ");
      pattern.setAttribute("aria-hidden", "true");
      pattern.dataset.fillMode = fillMode;

      for (let index = 0; index < 10; index += 1) {
        const dot = document.createElement("span");
        dot.className = `count-dot ${isFilledDot(index, value, fillMode) ? "is-filled" : "is-empty"}`;
        pattern.append(dot);
      }

      pattern.dataset.value = String(clamp(value, 0, 10));
      return pattern;
    }

    function isBigEnemy(enemy) {
      return Boolean(enemy && (enemy.isBig || enemy.type === "big"));
    }

    function currentBigSlotIndex(enemy) {
      if (!isBigEnemy(enemy) || !Array.isArray(enemy.slots)) {
        return -1;
      }

      enemy.slotIndex = enemy.slots.findIndex((slot) => !slot.filled);
      return enemy.slotIndex;
    }

    function currentBigSlot(enemy) {
      const slotIndex = currentBigSlotIndex(enemy);
      return slotIndex >= 0 ? enemy.slots[slotIndex] : null;
    }

    function currentEnemyValue(enemy) {
      if (!isBigEnemy(enemy)) {
        return enemy.value;
      }

      const slot = currentBigSlot(enemy);

      if (!slot) {
        enemy.value = 10;
        enemy.visualValue = 10;
        return 10;
      }

      enemy.value = slot.value;
      enemy.visualValue = slot.visualValue;
      return slot.value;
    }

    function targetDisplayInfo(enemy) {
      if (!isBigEnemy(enemy)) {
        return {
          label: "今の相手",
          value: enemy.value,
          progress: "",
          aria: `今の相手、${enemy.value}の敵`
        };
      }

      const slotIndex = currentBigSlotIndex(enemy);
      const slot = slotIndex >= 0 ? enemy.slots[slotIndex] : null;
      const slotCount = enemy.slots.length;

      if (!slot) {
        return {
          label: "大きな敵",
          value: 10,
          progress: `${slotCount}/${slotCount}`,
          aria: "今の相手、大きな敵、すべて達成"
        };
      }

      return {
        label: "大きな敵",
        value: slot.value,
        progress: `${slotIndex + 1}/${slotCount}`,
        aria: `今の相手、大きな敵、${slotIndex + 1}段目、${slot.value}`
      };
    }

    function isBigEnemyComplete(enemy) {
      return isBigEnemy(enemy) && enemy.slots.every((slot) => slot.filled);
    }

    function bigEnemyAriaLabel(enemy) {
      if (!isBigEnemy(enemy)) {
        return `${enemy.value}の敵`;
      }

      const remaining = enemy.slots
        .map((slot, index) => slot.filled ? "" : `${index + 1}段目${slot.value}`)
        .filter(Boolean)
        .join("、");

      return remaining ? `大きな敵。${remaining}` : "大きな敵。すべて達成";
    }

    function syncBigEnemyElement(enemy, element = enemyElements.get(enemy.id)) {
      if (!isBigEnemy(enemy) || !element) {
        return;
      }

      const activeSlotIndex = currentBigSlotIndex(enemy);
      element.setAttribute("aria-label", bigEnemyAriaLabel(enemy));
      element.querySelectorAll(".enemy-slot").forEach((slotElement, index) => {
        const slot = enemy.slots[index];

        if (!slot) {
          return;
        }

        const number = slotElement.querySelector(".enemy-slot-number");
        const visualValue = slot.filled ? 10 : slot.visualValue;
        slotElement.classList.toggle("is-filled", slot.filled);
        slotElement.classList.toggle("is-active", index === activeSlotIndex && !enemy.hit);
        slotElement.setAttribute("aria-label", slot.filled ? `${index + 1}段目達成` : `${index + 1}段目 ${slot.value}`);

        if (number) {
          number.textContent = slot.filled ? "" : String(slot.value);
        }

        if (slotElement.countPattern) {
          setPatternValue(slotElement.countPattern, visualValue);
        }
      });
    }

    function setBigEnemySlotVisualValue(enemy, slotIndex, value) {
      const slot = enemy.slots && enemy.slots[slotIndex];

      if (!slot) {
        return;
      }

      slot.visualValue = clamp(value, 0, 10);

      if (slotIndex === currentBigSlotIndex(enemy)) {
        enemy.visualValue = slot.visualValue;
      }

      syncBigEnemyElement(enemy);
    }

    function setBigEnemySlotValue(enemy, value) {
      const slot = currentBigSlot(enemy);

      if (!slot) {
        return;
      }

      slot.value = clamp(value, 1, 9);
      slot.visualValue = slot.value;
      enemy.value = slot.value;
      enemy.visualValue = slot.visualValue;
      syncBigEnemyElement(enemy);
    }

    function fillBigEnemySlot(enemy, slotIndex) {
      const slot = enemy.slots && enemy.slots[slotIndex];

      if (!slot) {
        return;
      }

      slot.filled = true;
      slot.visualValue = 10;

      const nextSlot = currentBigSlot(enemy);

      if (nextSlot) {
        enemy.value = nextSlot.value;
        enemy.visualValue = nextSlot.visualValue;
      } else {
        enemy.value = 10;
        enemy.visualValue = 10;
      }

      syncBigEnemyElement(enemy);
    }

    function completeBigEnemySlots(enemy) {
      if (!isBigEnemy(enemy)) {
        return;
      }

      enemy.slots.forEach((slot) => {
        slot.filled = true;
        slot.visualValue = 10;
      });
      enemy.slotIndex = -1;
      enemy.value = 10;
      enemy.visualValue = 10;
      syncBigEnemyElement(enemy);
    }

    function enemyImpactY(target) {
      const laneY = lanes[target.laneIndex];

      if (!isBigEnemy(target)) {
        return laneY - 6;
      }

      const slotIndex = Math.max(0, currentBigSlotIndex(target));
      return laneY - 17 + slotIndex * 8;
    }

    function enemyFloatingY(target, slotIndex = currentBigSlotIndex(target)) {
      if (!isBigEnemy(target)) {
        return lanes[target.laneIndex] - 15;
      }

      return lanes[target.laneIndex] - 30 + Math.max(0, slotIndex) * 10;
    }

    function advanceEnemiesForMiss(ratio) {
      const distance = (spawnX - wallX) * ratio;
      const target = activeEnemies()
        .filter((enemy) => !enemy.atCastle)
        .sort((a, b) => a.x - b.x)[0] || null;

      if (!target) {
        return false;
      }

      target.x = Math.max(castleContactX, target.x - distance);

      if (state.phase === "playing" && target.x <= castleContactX) {
        markEnemyAtCastle(target);
      }

      return true;
    }

    function shuffleValues(values) {
      const shuffled = [...values];

      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
      }

      return shuffled;
    }

    function differentEnemyValue(value) {
      const candidates = attackBaseValues.filter((candidate) => candidate !== value);
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function shuffleEnemiesForMiss() {
      const targets = state.enemies.filter((enemy) => !enemy.hit && !enemy.pendingImpact);

      if (targets.length === 0) {
        return false;
      }

      if (targets.length === 1) {
        setEnemyValue(targets[0], differentEnemyValue(targets[0].value));
        return true;
      }

      let values = targets.map((enemy) => enemy.value);

      for (let attempt = 0; attempt < 8; attempt += 1) {
        const candidate = shuffleValues(values);
        if (candidate.some((value, index) => value !== targets[index].value)) {
          values = candidate;
          break;
        }
      }

      values.forEach((value, index) => {
        const target = targets[index];
        setEnemyValue(target, value === target.value ? differentEnemyValue(target.value) : value);
      });

      return true;
    }

    function applyMissPenalty() {
      const rule = currentDifficulty();
      const notices = [];

      if (rule.missAdvanceRatio > 0 && activeEnemies().length > 0) {
        if (advanceEnemiesForMiss(rule.missAdvanceRatio)) {
          addFloating("前進", wallX + 18, 68, "over");
          notices.push("敵が前進");
        }
      }

      if (rule.shuffleEnemiesOnMiss) {
        if (shuffleEnemiesForMiss()) {
          addFloating("敵入替", wallX + 20, 22, "wave");
          notices.push("敵の数が入替");
        }
      }

      return notices;
    }

    function withPenaltyMessage(baseText, notices) {
      return notices.length > 0 ? `${baseText} / ${notices.join(" / ")}` : baseText;
    }

    function clearEnemyTimers(enemy) {
      if (!enemy.animationTimers) {
        enemy.animationTimers = [];
        return;
      }

      enemy.animationTimers.forEach((timerId) => clearTimeout(timerId));
      enemy.animationTimers = [];
    }

    function setEnemyVisualValue(enemy, value) {
      if (isBigEnemy(enemy)) {
        const slotIndex = currentBigSlotIndex(enemy);

        if (slotIndex >= 0) {
          setBigEnemySlotVisualValue(enemy, slotIndex, value);
        }

        return;
      }

      enemy.visualValue = clamp(value, 0, 10);
      const element = enemyElements.get(enemy.id);

      if (element && element.countPattern) {
        setPatternValue(element.countPattern, enemy.visualValue);
      }
    }

    function setEnemyValue(enemy, value) {
      if (isBigEnemy(enemy)) {
        setBigEnemySlotValue(enemy, value);
        return;
      }

      enemy.value = clamp(value, 1, 9);
      setEnemyVisualValue(enemy, enemy.value);
      const element = enemyElements.get(enemy.id);

      if (!element) {
        return;
      }

      const number = element.querySelector(".enemy-number");

      if (number) {
        number.textContent = String(enemy.value);
      }

      element.setAttribute("aria-label", `${enemy.value}の敵`);
    }

    function animateEnemyPattern(enemy, toValue, shouldRestore) {
      clearEnemyTimers(enemy);

      if (isBigEnemy(enemy)) {
        const slotIndex = currentBigSlotIndex(enemy);

        if (slotIndex < 0) {
          return;
        }

        const slot = enemy.slots[slotIndex];
        const fromValue = clamp(slot.visualValue, 0, 10);
        const finalValue = clamp(toValue, 0, 10);
        const direction = finalValue >= fromValue ? 1 : -1;
        let delay = 0;

        for (
          let value = fromValue + direction;
          direction > 0 ? value <= finalValue : value >= finalValue;
          value += direction
        ) {
          delay += 70;
          const timerId = setTimeout(() => setBigEnemySlotVisualValue(enemy, slotIndex, value), delay);
          enemy.animationTimers.push(timerId);
        }

        if (fromValue === finalValue) {
          setBigEnemySlotVisualValue(enemy, slotIndex, finalValue);
        }

        if (shouldRestore) {
          const timerId = setTimeout(() => {
            const currentSlot = enemy.slots[slotIndex];
            if (currentSlot && !currentSlot.filled) {
              setBigEnemySlotVisualValue(enemy, slotIndex, currentSlot.value);
            }
          }, delay + 420);
          enemy.animationTimers.push(timerId);
        }

        return;
      }

      const fromValue = clamp(enemy.visualValue, 0, 10);
      const finalValue = clamp(toValue, 0, 10);
      const direction = finalValue >= fromValue ? 1 : -1;
      let delay = 0;

      for (
        let value = fromValue + direction;
        direction > 0 ? value <= finalValue : value >= finalValue;
        value += direction
      ) {
        delay += 70;
        const timerId = setTimeout(() => setEnemyVisualValue(enemy, value), delay);
        enemy.animationTimers.push(timerId);
      }

      if (fromValue === finalValue) {
        setEnemyVisualValue(enemy, finalValue);
      }

      if (shouldRestore) {
        const timerId = setTimeout(() => setEnemyVisualValue(enemy, enemy.value), delay + 420);
        enemy.animationTimers.push(timerId);
      }
    }

    function flashEnemy(enemy, className) {
      const element = enemyElements.get(enemy.id);

      if (!element) {
        return;
      }

      element.classList.remove("is-low", "is-over");
      element.classList.add(className);
      setTimeout(() => element.classList.remove(className), 520);
    }

    function createSvgUse(symbolId, className) {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 24 24");
      svg.setAttribute("aria-hidden", "true");
      svg.setAttribute("focusable", "false");
      className.split(" ").filter(Boolean).forEach((name) => svg.classList.add(name));

      const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
      use.setAttribute("href", `#${symbolId}`);
      svg.append(use);
      return svg;
    }

    function createEnemyGlyph() {
      const glyph = document.createElement("span");
      glyph.className = "enemy-creature";
      glyph.setAttribute("aria-hidden", "true");
      glyph.append(
        createSvgUse("icon-enemy-sword", "person-icon enemy-creature-sword"),
        createSvgUse("icon-enemy-shield", "person-icon enemy-creature-shield"),
        createSvgUse("icon-enemy-skull", "person-icon enemy-creature-skull")
      );
      return glyph;
    }

    function createEnemyElement(enemy) {
      const element = document.createElement("div");
      element.className = isBigEnemy(enemy) ? "enemy is-big" : "enemy";
      element.setAttribute("role", "img");
      element.setAttribute("aria-label", bigEnemyAriaLabel(enemy));

      const figure = document.createElement("span");
      figure.className = "enemy-figure";
      figure.append(createEnemyGlyph());

      if (isBigEnemy(enemy)) {
        const slots = document.createElement("span");
        slots.className = "enemy-slots";

        enemy.slots.forEach((slot, index) => {
          const slotElement = document.createElement("span");
          slotElement.className = "enemy-slot";
          slotElement.dataset.slotIndex = String(index);

          const number = document.createElement("span");
          number.className = "enemy-slot-number";
          number.textContent = String(slot.value);

          const pattern = createCountPattern(slot.visualValue, "enemy-slot-pattern", "front");
          slotElement.countPattern = pattern;
          slotElement.append(number, pattern);
          slots.append(slotElement);
        });

        element.append(figure, slots);
        syncBigEnemyElement(enemy, element);
      } else {
        const number = document.createElement("span");
        number.className = "enemy-number";
        number.textContent = String(enemy.value);

        const pattern = createCountPattern(enemy.visualValue, "enemy-pattern", "front");
        element.countPattern = pattern;
        element.append(figure, number, pattern);
      }

      refs.enemyLayer.append(element);
      enemyElements.set(enemy.id, element);
      return element;
    }

    function createArrowElement(arrow) {
      const element = document.createElement("div");
      element.className = "shot-burst";
      element.setAttribute("aria-hidden", "true");

      if (arrow.value === 0) {
        const zero = document.createElement("span");
        zero.className = "shot-zero";
        zero.textContent = "0";
        element.append(zero);
      } else {
        const dot = document.createElement("span");
        dot.className = "shot-dot";
        element.append(dot);
      }

      refs.arrowLayer.append(element);
      arrowElements.set(arrow.id, element);
      return element;
    }

    function createFloatingElement(item) {
      const element = document.createElement("div");
      element.className = `floating-text ${item.kind}`;

      if (item.kind === "spill") {
        const dot = document.createElement("span");
        dot.className = "spill-dot";
        element.append(dot);
      } else if (item.kind === "meteor") {
        const rock = document.createElement("span");
        rock.className = "meteor-rock";
        element.append(rock);
      } else if (item.kind === "snipe-impact") {
        const mark = document.createElement("span");
        mark.className = "snipe-impact-mark";
        element.append(mark);
      } else if (item.kind === "blast") {
        const blast = document.createElement("span");
        blast.className = "blast-mark";
        element.append(blast);
      } else {
        element.textContent = item.text;
      }

      refs.floatingLayer.append(element);
      floatingElements.set(item.id, element);
      return element;
    }

    function spawnEnemy() {
      if (state.enemies.length >= maxEnemies()) {
        return;
      }

      const laneIndex = Math.floor(Math.random() * lanes.length);
      const isBig = shouldSpawnBigEnemy();
      const slots = isBig ? createBigEnemySlots() : null;
      const value = isBig ? slots[0].value : randomEnemyValue();
      const spawnPositionX = nextEnemySpawnX();
      state.enemies.push({
        id: state.nextEnemyId,
        type: isBig ? "big" : "normal",
        isBig,
        value,
        visualValue: value,
        slots,
        slotIndex: isBig ? 0 : -1,
        laneIndex,
        x: spawnPositionX,
        speed: enemyMoveSpeed,
        hit: false,
        pendingImpact: false,
        atCastle: false,
        nextCastleAttackAt: null,
        removeAt: null,
        animationTimers: []
      });
      state.spawnsSinceBigEnemy = isBig ? 0 : state.spawnsSinceBigEnemy + 1;
      state.nextEnemyId += 1;
    }

    function closestEnemy() {
      return state.enemies
        .filter((enemy) => !enemy.hit && !enemy.pendingImpact)
        .sort((a, b) => a.x - b.x)[0] || null;
    }

    function pendingBigEnemy() {
      return state.enemies
        .filter((enemy) => !enemy.hit && enemy.pendingImpact && isBigEnemy(enemy))
        .sort((a, b) => a.x - b.x)[0] || null;
    }

    function attackTarget() {
      return pendingBigEnemy() || closestEnemy();
    }

    function featuredEnemy() {
      const pendingTarget = state.enemies
        .filter((enemy) => !enemy.hit && enemy.pendingImpact)
        .sort((a, b) => a.x - b.x)[0] || null;

      return pendingTarget || closestEnemy();
    }

    function addArrow(target, value) {
      const laneY = lanes[target.laneIndex];
      const targetY = enemyImpactY(target);
      const startAt = now();

      if (value === 0) {
        state.arrows.push({
          id: state.nextArrowId,
          value: 0,
          fromX: wallX - 2,
          fromY: laneY - 5,
          toX: target.x,
          toY: targetY,
          startAt,
          endAt: startAt + shotTravelMs
        });
        state.nextArrowId += 1;
        return;
      }

      for (let index = 0; index < value; index += 1) {
        const rowOffset = (index % 3) - 1;
        const columnOffset = Math.floor(index / 3) * 0.7;
        const ballStartAt = startAt + index * shotIntervalMs;

        state.arrows.push({
          id: state.nextArrowId,
          value: 1,
          fromX: wallX - 2,
          fromY: laneY - 5 + rowOffset * 2,
          toX: target.x - 1 + columnOffset,
          toY: targetY + rowOffset * 4,
          startAt: ballStartAt,
          endAt: ballStartAt + shotTravelMs
        });
        state.nextArrowId += 1;
      }
    }

    function addFloating(text, x, y, kind = "") {
      state.floating.push({
        id: state.nextFloatingId,
        text,
        x,
        y,
        kind,
        startAt: now(),
        endAt: now() + 820
      });
      state.nextFloatingId += 1;
    }

    function addSpillBalls(target, count) {
      const laneY = lanes[target.laneIndex];
      const originY = isBigEnemy(target) ? enemyFloatingY(target) : laneY - 8;

      for (let index = 0; index < count; index += 1) {
        const rowOffset = (index % 3) - 1;
        const column = Math.floor(index / 3);
        state.floating.push({
          id: state.nextFloatingId,
          text: "",
          x: target.x + 1,
          y: originY,
          toX: target.x + 8 + column * 3,
          toY: originY - 20 + rowOffset * 10,
          kind: "spill",
          startAt: now(),
          endAt: now() + 720
        });
        state.nextFloatingId += 1;
      }
    }

    function addCoinBurst(target, count) {
      const laneY = lanes[target.laneIndex];
      const burstCount = Math.min(count, 10);

      for (let index = 0; index < burstCount; index += 1) {
        const rowOffset = (index % 5) - 2;
        const column = Math.floor(index / 5);
        state.floating.push({
          id: state.nextFloatingId,
          text: "",
          x: target.x,
          y: laneY - 20,
          toX: target.x + rowOffset * 4,
          toY: laneY - 44 - column * 9 - Math.abs(rowOffset) * 2,
          kind: "coin-mini",
          startAt: now(),
          endAt: now() + 900
        });
        state.nextFloatingId += 1;
      }
    }

    function playCoinSoundBurst(count) {
      const repeatCount = Math.max(1, Math.min(count, 6));

      for (let index = 0; index < repeatCount; index += 1) {
        setTimeout(playCoinSound, index * 82);
      }
    }

    function addCoinBurstAt(x, y, count) {
      const burstCount = Math.min(Math.max(1, count), 18);

      for (let index = 0; index < burstCount; index += 1) {
        const rowOffset = (index % 6) - 2.5;
        const column = Math.floor(index / 6);
        state.floating.push({
          id: state.nextFloatingId,
          text: "",
          x,
          y,
          toX: x + rowOffset * 3.8,
          toY: y - 22 - column * 10 - Math.abs(rowOffset) * 2,
          kind: "coin-mini",
          startAt: now(),
          endAt: now() + 960
        });
        state.nextFloatingId += 1;
      }
    }

    function addCoinsAt(amount, x, y, label = null) {
      const reward = Math.max(1, Math.floor(amount));
      state.coins += reward;
      state.coinPulseUntil = now() + (reward >= 10 ? 1100 : 760);
      addFloating(label || `+${reward}`, x, y, "coin");
      addCoinBurstAt(x, y + 6, reward);
      playCoinSoundBurst(reward);
      setTimeout(render, reward >= 10 ? 980 : 620);
    }

    function addCoinReward(target, amount = 1) {
      const reward = Math.max(1, Math.floor(amount));
      state.coins += reward;
      state.coinPulseUntil = now() + (reward > 1 ? 900 : 480);
      addFloating(`+${reward}`, target.x, lanes[target.laneIndex] - 29, "coin");

      if (reward > 1) {
        addCoinBurst(target, reward);
      }

      playCoinSoundBurst(reward);
      setTimeout(render, reward > 1 ? 920 : 520);
    }

    function spendCoins(cost) {
      if (state.coins < cost) {
        state.coinPulseUntil = now() + 480;
        setFeedback(`コインが${cost}必要`);
        return false;
      }

      state.coins -= cost;
      state.coinPulseUntil = now() + 480;
      addFloating(`-${cost}`, wallX + 8, 26, "coin-spend");
      return true;
    }

    function randomInRange([min, max]) {
      return min + Math.random() * (max - min);
    }

    function scheduleTreasure(baseTime = now(), delayRange = treasureDelayRangeMs) {
      state.treasureOpen = false;
      state.treasureCountingDown = false;
      state.treasureClaimed = false;
      state.treasureCountdownStartAt = 0;
      state.treasureHideAt = 0;
      state.treasureNextAt = baseTime + randomInRange(delayRange);
    }

    function closeTreasure() {
      state.treasureOpen = false;
      state.treasureCountingDown = false;
      state.treasureClaimed = false;
      state.treasureCountdownStartAt = 0;
      state.treasureHideAt = 0;
    }

    function startTreasureCountdown(timestamp = now()) {
      state.treasureOpen = false;
      state.treasureCountingDown = true;
      state.treasureClaimed = false;
      state.treasureCountdownStartAt = timestamp;
      state.treasureHideAt = 0;
      state.treasureNextAt = 0;
      setFeedback("城門が開くまで3");
    }

    function openTreasure(timestamp = now()) {
      state.treasureOpen = true;
      state.treasureCountingDown = false;
      state.treasureClaimed = false;
      state.treasureCountdownStartAt = 0;
      state.treasureHideAt = timestamp + treasureVisibleMs;
      state.treasureNextAt = 0;
      setFeedback("城門が開いた");
    }

    function updateTreasure(timestamp) {
      if (state.phase !== "playing") {
        return;
      }

      if (
        !state.treasureOpen &&
        !state.treasureCountingDown &&
        state.treasureNextAt > 0 &&
        timestamp >= state.treasureNextAt
      ) {
        startTreasureCountdown(timestamp);
        return;
      }

      if (state.treasureCountingDown) {
        if (timestamp - state.treasureCountdownStartAt >= treasureCountdownMs) {
          openTreasure(timestamp);
        }
        return;
      }

      if (state.treasureOpen && timestamp >= state.treasureHideAt) {
        closeTreasure();
        scheduleTreasure(timestamp);
      }
    }

    function treasureCountdownValue(timestamp = now()) {
      if (!state.treasureCountingDown || state.treasureCountdownStartAt <= 0) {
        return "";
      }

      const elapsed = clamp(timestamp - state.treasureCountdownStartAt, 0, treasureCountdownMs - 1);
      return String(Math.max(1, treasureCountdownSeconds - Math.floor(elapsed / 1000)));
    }

    function drawTreasureReward() {
      const roll = Math.random();

      if (roll < 0.5) {
        return 1;
      }

      if (roll < 0.8) {
        return 5;
      }

      if (roll < 0.95) {
        return 10;
      }

      return 50;
    }

    function claimTreasure() {
      if (
        state.phase !== "playing" ||
        !state.treasureOpen ||
        state.treasureClaimed ||
        now() >= state.treasureHideAt
      ) {
        return;
      }

      state.treasureClaimed = true;
      closeTreasure();
      const reward = drawTreasureReward();
      addCoinsAt(reward, wallX * 0.5, 79, `+${reward}`);
      setFeedback(`宝箱から${reward}コイン`);
      scheduleTreasure(now());
      render();
    }

    function updateBestScore() {
      if (state.score > state.best) {
        state.best = state.score;
        localStorage.setItem("game4BestScore", String(state.best));
      }
    }

    function defeatEnemy(target, options = {}) {
      if (!target || target.hit) {
        return { defeated: false, waveAdvanced: false, cleared: false };
      }

      const shouldUseCombo = options.useCombo === true;
      const scoreBase = options.scoreBase ?? 100;
      const rewardCoins = options.rewardCoins ?? (
        isBigEnemy(target) ? bigEnemyRewardCoins : (options.rewardCoin ? 1 : 0)
      );
      const removeDelay = options.removeDelay ?? 850;
      target.pendingImpact = false;
      clearEnemyCastleState(target);
      target.hit = true;
      target.removeAt = now() + removeDelay;
      clearEnemyTimers(target);

      if (isBigEnemy(target)) {
        completeBigEnemySlots(target);
      } else {
        animateEnemyPattern(target, 10, false);
      }

      if (options.text !== "") {
        addFloating(
          options.text || (isBigEnemy(target) ? "大撃破" : `${target.value}=10`),
          target.x,
          lanes[target.laneIndex] - 15,
          options.kind || "ok"
        );
      }

      if (options.playSound !== false) {
        playDefeatSound();
      }

      if (rewardCoins > 0) {
        addCoinReward(target, rewardCoins);
      }

      if (shouldUseCombo) {
        state.combo += 1;
      }

      state.defeated += 1;
      const comboPoints = shouldUseCombo ? state.combo * 12 : 0;
      state.score += scoreBase + comboPoints + Math.round((target.x - wallX) * 1.5);
      updateBestScore();

      return {
        defeated: true,
        waveAdvanced: false,
        cleared: false
      };
    }

    function addMeteor(target, index) {
      state.floating.push({
        id: state.nextFloatingId,
        text: "",
        x: 24 + index * 13 % 78,
        y: -14 - index * 6,
        toX: clamp(target.x + (index % 3 - 1) * 4, wallX + 7, spawnX - 4),
        toY: enemyImpactY(target) + (index % 2 ? 5 : -5),
        kind: "meteor",
        startAt: now(),
        endAt: now() + meteorTravelMs
      });
      state.nextFloatingId += 1;
    }

    function addSnipeImpact(target) {
      state.floating.push({
        id: state.nextFloatingId,
        text: "",
        x: target.x,
        y: enemyImpactY(target) - 6,
        kind: "snipe-impact",
        startAt: now(),
        endAt: now() + 680
      });
      state.nextFloatingId += 1;
    }

    function addBlast(x, y, delay = 0) {
      state.floating.push({
        id: state.nextFloatingId,
        text: "",
        x,
        y,
        kind: "blast",
        startAt: now() + delay,
        endAt: now() + delay + 760
      });
      state.nextFloatingId += 1;
    }

    function shakeBattlefield(className, duration) {
      refs.battlefield.classList.remove("is-shaking", "is-heavy-shaking");
      refs.battlefield.classList.add(className);
      setTimeout(() => refs.battlefield.classList.remove(className), duration);
    }

    function activeEnemies() {
      return state.enemies.filter((enemy) => !enemy.hit);
    }

    function clearEnemyCastleState(enemy) {
      if (!enemy) {
        return;
      }

      enemy.atCastle = false;
      enemy.nextCastleAttackAt = null;
    }

    function clearEnemyRuntimeState(enemy) {
      clearEnemyTimers(enemy);
      clearEnemyCastleState(enemy);
      enemy.pendingImpact = false;
    }

    function markEnemyAtCastle(enemy, elapsedSeconds = state.elapsed) {
      if (!enemy || enemy.hit) {
        return false;
      }

      enemy.x = castleContactX;

      if (enemy.atCastle) {
        if (enemy.nextCastleAttackAt === null) {
          enemy.nextCastleAttackAt = elapsedSeconds + castleAttackIntervalSeconds;
        }

        return false;
      }

      enemy.atCastle = true;
      enemy.nextCastleAttackAt = elapsedSeconds + castleAttackIntervalSeconds;
      return true;
    }

    function damageCastle(enemy) {
      if (state.phase !== "playing" || !enemy || enemy.hit) {
        return false;
      }

      state.combo = 0;
      state.castleHp = Math.max(0, state.castleHp - 1);
      playMissSound();
      addFloating("-1", wallX + 5, lanes[enemy.laneIndex] - 16, "over");
      setFeedback(`城壁にダメージ ${state.castleHp} / ${maxCastleHp}`);

      if (state.castleHp <= 0) {
        finishGame("over");
        return false;
      }

      return true;
    }

    function updateCastleAttack(enemy, elapsedSeconds) {
      if (!enemy || enemy.hit || !enemy.atCastle) {
        return true;
      }

      enemy.x = castleContactX;

      if (enemy.nextCastleAttackAt === null) {
        enemy.nextCastleAttackAt = elapsedSeconds + castleAttackIntervalSeconds;
        return true;
      }

      if (elapsedSeconds < enemy.nextCastleAttackAt) {
        return true;
      }

      damageCastle(enemy);

      if (state.phase !== "playing") {
        return false;
      }

      enemy.nextCastleAttackAt = elapsedSeconds + castleAttackIntervalSeconds;
      return true;
    }

    function useRepair() {
      if (state.phase !== "playing") {
        setFeedback("出撃してから使える");
        render();
        return;
      }

      if (state.castleHp >= maxCastleHp) {
        setFeedback("城壁は満タン");
        render();
        return;
      }

      if (!spendCoins(specialCosts.repair)) {
        playMissSound();
        render();
        return;
      }

      state.castleHp = Math.min(maxCastleHp, state.castleHp + 1);
      addFloating("+1", wallX + 8, 22, "ok");
      setFeedback(`城壁を修理 ${state.castleHp} / ${maxCastleHp}`);
      render();
    }

    function useSnipe() {
      if (state.phase !== "playing") {
        setFeedback("出撃してから使える");
        render();
        return;
      }

      const target = closestEnemy();

      if (!target) {
        playMissSound();
        setFeedback("狙える敵がいない");
        render();
        return;
      }

      if (!spendCoins(specialCosts.snipe)) {
        playMissSound();
        render();
        return;
      }

      state.combo = 0;
      playSnipeSound();
      addSnipeImpact(target);
      shakeBattlefield("is-shaking", 420);
      const result = defeatEnemy(target, {
        text: "撃破",
        kind: "ok",
        rewardCoin: false,
        useCombo: false,
        scoreBase: 70
      });

      setFeedback(result.waveAdvanced ? `ウェーブ${state.wave}開始` : "先頭を撃破");

      if (result.cleared) {
        finishGame("clear");
        return;
      }

      render();
    }

    function resolveMeteor(targets) {
      if (state.phase === "paused") {
        scheduleImpact(() => resolveMeteor(targets), 80);
        return;
      }

      state.meteorPending = false;

      if (state.phase !== "playing") {
        return;
      }

      let defeatedCount = 0;
      let waveAdvanced = false;
      let cleared = false;

      targets.forEach((target) => {
        if (!state.enemies.includes(target) || target.hit) {
          return;
        }

        const result = defeatEnemy(target, {
          text: "",
          rewardCoin: false,
          playSound: false,
          useCombo: false,
          scoreBase: 80
        });

        if (result.defeated) {
          defeatedCount += 1;
        }

        waveAdvanced = waveAdvanced || result.waveAdvanced;
        cleared = cleared || result.cleared;
      });

      if (defeatedCount > 0) {
        playMeteorImpactSound();
        shakeBattlefield("is-heavy-shaking", 720);
        targets.forEach((target, index) => {
          if (state.enemies.includes(target)) {
            addBlast(target.x, enemyImpactY(target), index * 35);
          }
        });
        addBlast(42, 58, 90);
        addBlast(72, 69, 140);
        addFloating("隕石", 58, 28, "wave");
        setFeedback(waveAdvanced ? `ウェーブ${state.wave}開始` : `${defeatedCount}体を隕石で撃破`);
      } else {
        playMissSound();
        setFeedback("隕石は空振り");
      }

      if (cleared) {
        finishGame("clear");
        return;
      }

      render();
    }

    function useMeteor() {
      if (state.phase !== "playing") {
        setFeedback("出撃してから使える");
        render();
        return;
      }

      if (state.meteorPending) {
        setFeedback("隕石が落下中");
        render();
        return;
      }

      const targets = activeEnemies();

      if (targets.length === 0) {
        playMissSound();
        setFeedback("狙える敵がいない");
        render();
        return;
      }

      if (!spendCoins(specialCosts.meteor)) {
        playMissSound();
        render();
        return;
      }

      state.combo = 0;
      state.meteorPending = true;
      targets.forEach((target, index) => {
        target.pendingImpact = true;
        addMeteor(target, index);
      });
      playMeteorSound();
      setFeedback("隕石が落ちる");
      scheduleImpact(() => resolveMeteor(targets), meteorTravelMs);
      render();
    }

    function setFeedback(text) {
      state.message = text;
    }

    function resolveShotMiss(target, value, targetValue, sum) {
      state.combo = 0;
      state.misses += 1;
      playMissSound();

      if (sum < 10) {
        animateEnemyPattern(target, sum, true);
        flashEnemy(target, "is-low");
        addFloating(`${sum}/10`, target.x, enemyFloatingY(target), "low");
      } else {
        animateEnemyPattern(target, 10, true);
        flashEnemy(target, "is-over");
        addSpillBalls(target, sum - 10);
        addFloating(`${sum}`, target.x, enemyFloatingY(target), "over");
      }

      const notices = applyMissPenalty();

      if (state.phase !== "playing") {
        render();
        return;
      }

      setFeedback(withPenaltyMessage(
        `${targetValue}と${value}で${sum}。${sum < 10 ? "まだ足りない" : "多すぎて弾かれた"}`,
        notices
      ));
      render();
    }

    function resolveBigEnemyShot(target, value, targetValue, sum, options = {}) {
      target.pendingImpact = false;
      const slotIndex = currentBigSlotIndex(target);

      if (slotIndex < 0) {
        render();
        return;
      }

      if (sum !== 10) {
        resolveShotMiss(target, value, targetValue, sum);
        return;
      }

      fillBigEnemySlot(target, slotIndex);
      playBigEnemyHitSound();
      addFloating(`${targetValue}+${value}=10`, target.x, enemyFloatingY(target, slotIndex), "ok");

      if (!isBigEnemyComplete(target)) {
        setFeedback(`大きな敵 ${slotIndex + 1}段目クリア。次は${currentEnemyValue(target)}`);
        render();
        return;
      }

      const result = defeatEnemy(target, {
        text: "大撃破",
        kind: "ok",
        rewardCoins: bigEnemyRewardCoins,
        useCombo: true,
        scoreBase: 260,
        removeDelay: options.removeDelay
      });

      setFeedback(
        result.waveAdvanced ? `ウェーブ${state.wave}開始` : `大きな敵を撃破 +${bigEnemyRewardCoins}コイン`
      );

      if (result.cleared) {
        finishGame("clear");
        return;
      }

      render();
    }

    function resolveShot(target, value, options = {}) {
      if (state.phase !== "playing" || !state.enemies.includes(target) || target.hit) {
        return;
      }

      const targetValue = currentEnemyValue(target);
      const sum = targetValue + value;

      if (isBigEnemy(target)) {
        resolveBigEnemyShot(target, value, targetValue, sum, options);
        return;
      }

      target.pendingImpact = false;

      if (sum !== 10) {
        resolveShotMiss(target, value, targetValue, sum);
        return;
      }

      const result = defeatEnemy(target, {
        text: `${targetValue}+${value}=10`,
        rewardCoin: true,
        useCombo: true,
        removeDelay: options.removeDelay
      });

      setFeedback(result.waveAdvanced ? `ウェーブ${state.wave}開始` : `${targetValue}と${value}で10`);

      if (result.cleared) {
        finishGame("clear");
        return;
      }

      render();
    }

    function shoot(value) {
      if (state.phase === "ready" || state.phase === "waveClear") {
        startGame();
      }

      if (state.phase !== "playing") {
        return;
      }

      const target = attackTarget();

      if (target && target.pendingImpact) {
        setFeedback("大きな攻撃が着弾中");
        render();
        return;
      }

      state.lastButtonValue = value;
      state.activeButtonUntil = now() + 150;
      playShotSound(value);

      if (!target) {
        state.combo = 0;
        state.misses += 1;
        playMissSound();
        addFloating(`${value}`, wallX + 12, 34 + Math.random() * 42, "miss");
        const notices = applyMissPenalty();
        if (state.phase !== "playing") {
          render();
          return;
        }
        setFeedback(withPenaltyMessage(`${value}の玉は空振り`, notices));
        render();
        return;
      }

      addArrow(target, value);
      resolveShot(target, value, {
        removeDelay: Math.max(850, impactDelay(value) + 260)
      });
    }

    function startGame() {
      cancelAnimationFrame(state.frameId);
      state.frameId = null;

      if (state.phase === "waveClear") {
        startNextWave();
        return;
      }

      state.phase = "playing";
      state.lastFrameAt = now();
      state.lastSpawnAt = now();
      state.spawnHoldUntil = 0;
      state.settleUntil = 0;
      scheduleTreasure(now(), treasureFirstDelayRangeMs);

      if (state.enemies.length === 0) {
        spawnEnemy();
      }

      setFeedback("30秒守りきれ");
      state.frameId = requestAnimationFrame(update);
      render();
    }

    function pauseGame() {
      if (state.phase === "playing") {
        state.phase = "paused";
        cancelAnimationFrame(state.frameId);
        state.frameId = null;
        render();
        return;
      }

      if (state.phase === "paused") {
        state.phase = "playing";
        state.lastFrameAt = now();
        state.frameId = requestAnimationFrame(update);
        render();
      }
    }

    function hasGameProgress() {
      return (
        state.phase === "playing" ||
        state.phase === "paused" ||
        state.phase === "waveClear" ||
        state.score > 0 ||
        state.coins > 0 ||
        state.wave > 1 ||
        state.enemies.length > 0
      );
    }

    function confirmAction(message) {
      if (typeof window.confirm !== "function") {
        return true;
      }

      return window.confirm(message);
    }

    function confirmAndResetGame() {
      if (!hasGameProgress() || confirmAction("本当にやり直しますか？ いまの進行は消えます。")) {
        resetGame();
      }
    }

    function confirmPageJump(event) {
      if (!hasGameProgress()) {
        return;
      }

      const wasPlaying = state.phase === "playing";

      if (wasPlaying) {
        state.phase = "paused";
        cancelAnimationFrame(state.frameId);
        state.frameId = null;
        render();
      }

      if (confirmAction("本当に戻りますか？ いまのゲームは中断されます。")) {
        return;
      }

      event.preventDefault();

      if (wasPlaying) {
        state.phase = "playing";
        state.lastFrameAt = now();
        state.frameId = requestAnimationFrame(update);
      }

      render();
    }

    function resetGame() {
      cancelAnimationFrame(state.frameId);
      state.frameId = null;
      clearImpactTimers();
      state.enemies.forEach(clearEnemyRuntimeState);
      state.phase = "ready";
      state.message = "準備完了";
      state.coins = 0;
      state.score = 0;
      state.defeated = 0;
      state.combo = 0;
      state.misses = 0;
      state.castleHp = maxCastleHp;
      state.wave = 1;
      state.elapsed = 0;
      state.nextEnemyId = 1;
      state.nextArrowId = 1;
      state.nextFloatingId = 1;
      state.lastFrameAt = 0;
      state.lastSpawnAt = 0;
      state.spawnsSinceBigEnemy = 0;
      state.spawnHoldUntil = 0;
      state.settleUntil = 0;
      state.lastButtonValue = null;
      state.activeButtonUntil = 0;
      state.coinPulseUntil = 0;
      closeTreasure();
      state.treasureNextAt = 0;
      clearFieldObjects();
      setFeedback("準備完了");
      render();
    }

    function pruneTransientEffects(timestamp) {
      state.enemies = state.enemies.filter((enemy) => !enemy.removeAt || enemy.removeAt > timestamp);
      state.arrows = state.arrows.filter((arrow) => arrow.endAt > timestamp);
      state.floating = state.floating.filter((item) => item.endAt > timestamp);
    }

    function clearFieldObjects() {
      clearImpactTimers();
      state.enemies.forEach(clearEnemyRuntimeState);
      state.enemies = [];
      state.arrows = [];
      state.floating = [];
      state.impactTimers = [];
      state.meteorPending = false;
      closeTreasure();
      enemyElements.forEach((element) => element.remove());
      arrowElements.forEach((element) => element.remove());
      floatingElements.forEach((element) => element.remove());
      enemyElements.clear();
      arrowElements.clear();
      floatingElements.clear();
    }

    function settleEndEffects(timestamp) {
      if (state.phase !== "clear" && state.phase !== "over") {
        return;
      }

      pruneTransientEffects(timestamp);
      render(timestamp);

      const hasActiveEffects =
        state.enemies.some((enemy) => enemy.removeAt && enemy.removeAt > timestamp) ||
        state.arrows.length > 0 ||
        state.floating.length > 0 ||
        state.coinPulseUntil > timestamp;

      if (hasActiveEffects && timestamp < state.settleUntil) {
        state.frameId = requestAnimationFrame(settleEndEffects);
      }
    }

    function finishGame(result) {
      state.phase = result;
      cancelAnimationFrame(state.frameId);
      state.frameId = null;
      clearImpactTimers();
      state.meteorPending = false;
      state.spawnHoldUntil = 0;
      closeTreasure();
      state.treasureNextAt = 0;
      state.settleUntil = now() + 1400;
      const fallbackRemoveAt = now() + 500;
      state.enemies.forEach((enemy) => {
        clearEnemyRuntimeState(enemy);
        enemy.hit = true;

        if (!enemy.removeAt || enemy.removeAt < fallbackRemoveAt) {
          enemy.removeAt = fallbackRemoveAt;
        }
      });
      setFeedback(result === "clear" ? "城壁を守りきった" : "城壁が壊された");
      render();
      state.frameId = requestAnimationFrame(settleEndEffects);
    }

    function completeWave() {
      state.elapsed = waveDurationSeconds;
      cancelAnimationFrame(state.frameId);
      state.frameId = null;
      clearFieldObjects();
      state.spawnHoldUntil = 0;
      state.lastButtonValue = null;
      state.activeButtonUntil = 0;
      closeTreasure();
      state.treasureNextAt = 0;
      state.phase = "waveClear";
      setFeedback(`${currentWaveLabel()}突破`);
      playWaveFanfare();
      render();
    }

    function startNextWave() {
      cancelAnimationFrame(state.frameId);
      state.frameId = null;
      clearFieldObjects();
      state.wave += 1;
      state.elapsed = 0;
      state.combo = 0;
      state.misses = 0;
      state.lastFrameAt = now();
      state.lastSpawnAt = now();
      state.spawnHoldUntil = 0;
      state.settleUntil = 0;
      scheduleTreasure(now(), treasureFirstDelayRangeMs);
      state.phase = "playing";
      setFeedback(`${currentWaveLabel()}開始`);
      playWaveFanfare();
      spawnEnemy();
      state.frameId = requestAnimationFrame(update);
      render();
    }

    function update(timestamp) {
      if (state.phase !== "playing") {
        return;
      }

      const delta = clamp((timestamp - state.lastFrameAt) / 1000, 0, 0.05);
      state.lastFrameAt = timestamp;
      state.elapsed += delta;

      if (state.elapsed >= waveDurationSeconds) {
        completeWave();
        return;
      }

      if (timestamp >= state.spawnHoldUntil && timestamp - state.lastSpawnAt >= spawnInterval()) {
        spawnEnemy();
        state.lastSpawnAt = timestamp;
      }

      updateTreasure(timestamp);

      state.enemies.forEach((enemy) => {
        if (!enemy.hit && !enemy.atCastle) {
          enemy.x = Math.max(castleContactX, enemy.x - enemy.speed * delta);
        }
      });

      state.enemies.forEach((enemy) => {
        if (!enemy.hit && enemy.x <= castleContactX) {
          markEnemyAtCastle(enemy, state.elapsed);
        }
      });

      for (const enemy of state.enemies) {
        if (!updateCastleAttack(enemy, state.elapsed)) {
          return;
        }
      }

      if (state.phase !== "playing") {
        return;
      }

      pruneTransientEffects(timestamp);

      render(timestamp);
      state.frameId = requestAnimationFrame(update);
    }

    function renderEnemies() {
      const activeIds = new Set();

      state.enemies.forEach((enemy) => {
        activeIds.add(enemy.id);
        const element = enemyElements.get(enemy.id) || createEnemyElement(enemy);
        element.style.left = `${enemy.x}%`;
        element.style.top = `${lanes[enemy.laneIndex]}%`;
        element.style.zIndex = String(Math.round((spawnX - enemy.x) * 100) + enemy.laneIndex);
        element.classList.toggle("is-hit", enemy.hit);
        element.classList.toggle("is-at-castle", enemy.atCastle && !enemy.hit);
        element.classList.toggle("is-big", isBigEnemy(enemy));

        if (isBigEnemy(enemy)) {
          syncBigEnemyElement(enemy, element);
        } else if (element.countPattern && element.countPattern.dataset.value !== String(enemy.visualValue)) {
          setPatternValue(element.countPattern, enemy.visualValue);
        }
      });

      enemyElements.forEach((element, id) => {
        if (!activeIds.has(id)) {
          element.remove();
          enemyElements.delete(id);
        }
      });
    }

    function renderArrows(timestamp = now()) {
      const activeIds = new Set();

      state.arrows.forEach((arrow) => {
        if (timestamp < arrow.startAt) {
          return;
        }

        activeIds.add(arrow.id);
        const element = arrowElements.get(arrow.id) || createArrowElement(arrow);
        const progress = clamp((timestamp - arrow.startAt) / (arrow.endAt - arrow.startAt), 0, 1);
        const x = arrow.fromX + (arrow.toX - arrow.fromX) * progress;
        const y = arrow.fromY + (arrow.toY - arrow.fromY) * progress;
        const pop = Math.sin(progress * Math.PI) * 0.18;
        element.style.left = `${x}%`;
        element.style.top = `${y}%`;
        element.style.transform = `translate(-50%, -50%) scale(${1 + pop})`;
      });

      arrowElements.forEach((element, id) => {
        if (!activeIds.has(id)) {
          element.remove();
          arrowElements.delete(id);
        }
      });
    }

    function renderFloating(timestamp = now()) {
      const activeIds = new Set();

      state.floating.forEach((item) => {
        activeIds.add(item.id);
        const element = floatingElements.get(item.id) || createFloatingElement(item);
        const progress = clamp((timestamp - item.startAt) / (item.endAt - item.startAt), 0, 1);
        const x = item.toX === undefined ? item.x : item.x + (item.toX - item.x) * progress;
        const y = item.toY === undefined ? item.y - progress * 9 : item.y + (item.toY - item.y) * progress;
        element.style.left = `${x}%`;
        element.style.top = `${y}%`;
        element.style.opacity = `${1 - progress}`;
      });

      floatingElements.forEach((element, id) => {
        if (!activeIds.has(id)) {
          element.remove();
          floatingElements.delete(id);
        }
      });
    }

    function ensureTargetHudPattern() {
      if (!refs.targetHudPattern) {
        return null;
      }

      if (!refs.targetHudPattern.countPattern) {
        const pattern = createCountPattern(0, "target-pattern", "front");
        refs.targetHudPattern.countPattern = pattern;
        refs.targetHudPattern.append(pattern);
      }

      return refs.targetHudPattern.countPattern;
    }

    function renderTargetHud() {
      if (
        !refs.targetHud ||
        !refs.targetHudLabel ||
        !refs.targetHudNumber ||
        !refs.targetHudPattern ||
        !refs.targetHudProgress
      ) {
        return;
      }

      const target = featuredEnemy();
      const pattern = ensureTargetHudPattern();

      if (!target) {
        refs.targetHud.classList.add("is-empty");
        refs.targetHud.classList.remove("is-big-target");
        refs.targetHud.setAttribute("aria-hidden", "true");
        refs.targetHud.setAttribute("aria-label", "今の相手なし");
        refs.targetHudLabel.textContent = "今の相手";
        refs.targetHudNumber.textContent = "-";
        refs.targetHudProgress.textContent = "";

        if (pattern && pattern.dataset.value !== "0") {
          setPatternValue(pattern, 0);
        }

        return;
      }

      const info = targetDisplayInfo(target);
      refs.targetHud.classList.remove("is-empty");
      refs.targetHud.classList.toggle("is-big-target", isBigEnemy(target));
      refs.targetHud.setAttribute("aria-hidden", "false");
      refs.targetHud.setAttribute("aria-label", info.aria);
      refs.targetHudLabel.textContent = info.label;
      refs.targetHudNumber.textContent = String(info.value);
      refs.targetHudProgress.textContent = info.progress;

      if (pattern && pattern.dataset.value !== String(info.value)) {
        setPatternValue(pattern, info.value);
      }
    }

    function renderButtons() {
      refs.numberGrid.querySelectorAll(".number-button").forEach((button, index) => {
        const value = attackBaseValues[index];
        button.dataset.value = String(value);
        button.setAttribute("aria-label", `${value}の玉`);
        button.setAttribute("title", `${value}の玉`);
        const label = button.querySelector(".button-number");
        const pattern = button.querySelector(".button-pattern");

        if (label && label.textContent !== String(value)) {
          label.textContent = String(value);
        }

        if (pattern && pattern.dataset.value !== String(value)) {
          setPatternValue(pattern, value);
        }

        button.classList.toggle(
          "is-active",
          state.lastButtonValue === value && state.activeButtonUntil > now()
        );
      });

      const targetForActions = attackTarget();
      const isTargetLocked = Boolean(targetForActions && targetForActions.pendingImpact);
      const hasSnipeTarget = Boolean(targetForActions && !isTargetLocked);
      const hasMeteorTarget = activeEnemies().length > 0 && !state.meteorPending;
      const canRepair = state.castleHp < maxCastleHp;

      refs.numberGrid.querySelectorAll(".special-button").forEach((button) => {
        const action = button.dataset.action;
        const cost = specialCosts[action];
        let canUse = state.phase === "playing" && state.coins >= cost;

        if (action === "meteor") {
          canUse = canUse && hasMeteorTarget;
        } else if (action === "repair") {
          canUse = canUse && canRepair;
        } else {
          canUse = canUse && hasSnipeTarget;
        }

        button.disabled = !canUse;
      });
    }

    function setPauseButton(mode, disabled) {
      const label = mode === "resume" ? "再開" : "一時停止";
      refs.pauseButton.dataset.mode = mode;
      refs.pauseButton.setAttribute("aria-label", label);
      refs.pauseButton.setAttribute("title", label);
      refs.pauseButton.disabled = disabled;
    }

    function renderStatus() {
      refs.coinValue.textContent = String(state.coins);
      refs.coinBadge.classList.toggle("is-pulsing", state.coinPulseUntil > now());
      refs.scoreValue.textContent = String(state.score);
      refs.bestValue.textContent = String(state.best);
      const remainingSeconds = remainingMissionSeconds();
      refs.missionLabel.textContent = `${currentWaveLabel()} 残り時間`;
      refs.missionTimeValue.textContent = `${remainingSeconds}秒`;
      refs.goalMeter.style.width = `${missionRemainingRatio() * 100}%`;
      if (refs.goalMeter.parentElement) {
        refs.goalMeter.parentElement.classList.toggle("time-low", remainingSeconds <= 5);
      }
      refs.castleHpValue.textContent = String(state.castleHp);
      refs.castleHpMaxValue.textContent = String(maxCastleHp);
      refs.castleHpMeter.style.width = `${clamp(state.castleHp / maxCastleHp * 100, 0, 100)}%`;

      if (state.phase === "ready") {
        refs.phaseText.textContent = state.message || "準備完了";
        refs.startButton.setAttribute("aria-label", "出撃");
        refs.startButton.setAttribute("title", "出撃");
        refs.startButton.disabled = false;
        setPauseButton("pause", true);
      } else if (state.phase === "playing") {
        refs.phaseText.textContent = state.message || `連続 ${state.combo} / 空振り ${state.misses}`;
        refs.startButton.setAttribute("aria-label", "出撃中");
        refs.startButton.setAttribute("title", "出撃中");
        refs.startButton.disabled = true;
        setPauseButton("pause", false);
      } else if (state.phase === "paused") {
        refs.phaseText.textContent = "一時停止中";
        refs.startButton.setAttribute("aria-label", "出撃中");
        refs.startButton.setAttribute("title", "出撃中");
        refs.startButton.disabled = true;
        setPauseButton("resume", false);
      } else if (state.phase === "waveClear") {
        refs.phaseText.textContent = state.message || `${currentWaveLabel()}突破`;
        refs.startButton.setAttribute("aria-label", `${nextWaveLabel()}へ`);
        refs.startButton.setAttribute("title", `${nextWaveLabel()}へ`);
        refs.startButton.disabled = false;
        setPauseButton("pause", true);
      } else if (state.phase === "clear") {
        refs.phaseText.textContent = state.message || "防衛成功";
        refs.startButton.setAttribute("aria-label", "防衛成功");
        refs.startButton.setAttribute("title", "防衛成功");
        refs.startButton.disabled = true;
        setPauseButton("pause", true);
      } else {
        refs.phaseText.textContent = state.message || "ゲームオーバー";
        refs.startButton.setAttribute("aria-label", "ゲームオーバー");
        refs.startButton.setAttribute("title", "ゲームオーバー");
        refs.startButton.disabled = true;
        setPauseButton("pause", true);
      }
    }

    function renderTreasure() {
      if (!refs.castleWall || !refs.treasureChest) {
        return;
      }

      const canClaim =
        state.phase === "playing" &&
        state.treasureOpen &&
        !state.treasureClaimed &&
        now() < state.treasureHideAt;
      const isCountingDown =
        state.phase === "playing" &&
        state.treasureCountingDown &&
        state.treasureCountdownStartAt > 0;
      refs.castleWall.classList.toggle("is-treasure-open", canClaim);
      refs.castleWall.classList.toggle("is-treasure-countdown", isCountingDown);
      refs.treasureChest.disabled = !canClaim;
      refs.treasureChest.setAttribute("aria-hidden", canClaim ? "false" : "true");
      refs.treasureChest.tabIndex = canClaim ? 0 : -1;

      if (refs.treasureCountdown) {
        refs.treasureCountdown.textContent = treasureCountdownValue();
        refs.treasureCountdown.setAttribute("aria-hidden", isCountingDown ? "false" : "true");
      }
    }

    function render(timestamp = now()) {
      renderEnemies();
      renderArrows(timestamp);
      renderFloating(timestamp);
      renderTargetHud();
      renderButtons();
      renderStatus();
      renderTreasure();
    }

    function buildButtons() {
      attackBaseValues.forEach((initialValue) => {
        const button = document.createElement("button");
        button.className = "number-button";
        button.type = "button";
        button.dataset.value = String(initialValue);
        button.setAttribute("aria-label", `${initialValue}の玉`);
        button.setAttribute("title", `${initialValue}の玉`);
        button.addEventListener("click", () => shoot(Number(button.dataset.value)));

        const label = document.createElement("span");
        label.className = "button-number";
        label.textContent = String(initialValue);

        button.append(label, createCountPattern(initialValue, "button-pattern", "back"));
        refs.numberGrid.append(button);
      });

      createSpecialButton("snipe", "先頭撃破", specialCosts.snipe, "snipe", useSnipe);
      createSpecialButton("meteor", "隕石", specialCosts.meteor, "meteor", useMeteor);
      createSpecialButton("repair", "修理", specialCosts.repair, "repair", useRepair);
    }

    function createSpecialButton(action, label, cost, icon, handler) {
      const button = document.createElement("button");
      button.className = `special-button ${action}`;
      button.type = "button";
      button.dataset.action = action;
      button.setAttribute("aria-label", `${label} コイン${cost}`);
      button.setAttribute("title", `${label} コイン${cost}`);
      button.addEventListener("click", handler);

      const iconElement = document.createElement("span");
      iconElement.className = `special-icon ${icon}`;
      iconElement.setAttribute("aria-hidden", "true");

      const labelElement = document.createElement("span");
      labelElement.className = "special-label";
      labelElement.textContent = label;

      const costElement = document.createElement("span");
      costElement.className = "special-cost";
      costElement.textContent = `コイン${cost}`;

      button.append(iconElement, labelElement, costElement);
      refs.numberGrid.append(button);
    }

    refs.startButton.addEventListener("click", startGame);
    refs.pauseButton.addEventListener("click", pauseGame);
    refs.resetButton.addEventListener("click", confirmAndResetGame);
    refs.treasureChest.addEventListener("click", claimTreasure);
    document.querySelectorAll(".page-jump").forEach((link) => {
      link.addEventListener("click", confirmPageJump);
    });
    window.addEventListener("pointerdown", primeCoinSound, { once: true });
    window.addEventListener("keydown", primeCoinSound, { once: true });
    window.addEventListener("click", primeCoinSound, { once: true });
    window.addEventListener("pointerdown", primeMissSound, { once: true });
    window.addEventListener("keydown", primeMissSound, { once: true });
    window.addEventListener("click", primeMissSound, { once: true });
    window.addEventListener("pointerdown", primeBigHitSound, { once: true });
    window.addEventListener("keydown", primeBigHitSound, { once: true });
    window.addEventListener("click", primeBigHitSound, { once: true });
    window.addEventListener("pointerdown", primeSynthSound, { once: true });
    window.addEventListener("keydown", primeSynthSound, { once: true });
    window.addEventListener("click", primeSynthSound, { once: true });

    window.addEventListener("keydown", (event) => {
      if (event.key >= "1" && event.key <= "9") {
        shoot(Number(event.key));
      }
    });

    buildButtons();
    resetGame();
  </script>
</body>
</html>
